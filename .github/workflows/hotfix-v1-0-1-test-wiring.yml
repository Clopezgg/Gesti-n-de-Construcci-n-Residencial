name: Wire ConstruControl v1.0.1 MariaDB tests

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: construcontrol-v1-0-1-test-wiring-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  wire-tests:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Add the correction suite to real MariaDB gates
        run: |
          python - <<'PY'
          from pathlib import Path

          validation = Path('.github/workflows/construcontrol-validation.yml')
          lines = validation.read_text(encoding='utf-8').splitlines()
          marker = '      - name: Execute real FI01 FI02 FI03 CRUD and reconciliation'
          admin_marker = '      - name: Execute Administrator correction workflows against MariaDB'
          if admin_marker not in lines:
              index = lines.index(marker)
              insert_at = index + 2
              lines[insert_at:insert_at] = [
                  '',
                  admin_marker,
                  '        run: >-',
                  '          docker compose exec -T backend bench --site "$SITE_NAME" run-tests',
                  '          --module erpnext.construcontrol.tests.test_admin_corrections_mariadb',
              ]
          validation.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          certification = Path('.github/workflows/construcontrol-full-certification.yml')
          lines = certification.read_text(encoding='utf-8').splitlines()
          admin_command = '            bench --site test_site run-tests --module erpnext.construcontrol.tests.test_admin_corrections_mariadb'
          a1_marker = '          bench --site test_site run-tests --module erpnext.construcontrol.tests.test_mariadb_shared_fixtures \\'
          if admin_command not in lines:
              index = lines.index(a1_marker)
              lines[index:index + 2] = [
                  '          {',
                  '            bench --site test_site run-tests --module erpnext.construcontrol.tests.test_mariadb_shared_fixtures',
                  admin_command,
                  '          } 2>&1 | tee "$GITHUB_WORKSPACE/artifacts/gate-a/shard-1/finance.log"',
              ]
          a4_start = lines.index('      - name: A4 · complete A regression on the migrated site')
          smoke_index = lines.index(
              '            bench --site test_site execute erpnext.construcontrol.tests.runtime_smoke.run',
              a4_start,
          )
          if admin_command not in lines[a4_start:smoke_index]:
              lines.insert(smoke_index, admin_command)
          certification.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Format, remove this workflow and regenerate inventory
        run: |
          set -euo pipefail
          pip install pre-commit==3.8.0 PyYAML==6.0.2
          git rm .github/workflows/hotfix-v1-0-1-test-wiring.yml
          pre-commit run --all-files || true
          pre-commit run --all-files
          python scripts/generate_file_inventory.py
          python scripts/generate_file_inventory.py --check
          python - <<'PY'
          import pathlib, yaml
          for path in (
              '.github/workflows/construcontrol-validation.yml',
              '.github/workflows/construcontrol-full-certification.yml',
          ):
              yaml.safe_load(pathlib.Path(path).read_text())
          PY

      - name: Publish the clean test-wiring commit
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'test(hotfix): run corrections against MariaDB'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
