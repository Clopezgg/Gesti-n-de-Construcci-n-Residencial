name: Finalize ConstruControl v1.0.1 inventory

on:
  push:
    branches:
      - hotfix/construcontrol-v1.0.1-admin-corrections

permissions:
  contents: write

concurrency:
  group: construcontrol-v1-0-1-inventory-finalize
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/construcontrol-v1.0.1-admin-corrections
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Remove this workflow from the index and regenerate inventory
        run: |
          set -euo pipefail
          git rm .github/workflows/hotfix-v1-0-1-inventory-finalize.yml
          python scripts/generate_file_inventory.py
          python scripts/generate_file_inventory.py --check
          python erpnext/construcontrol/tests/test_admin_corrections_contract_standalone.py
          python -m compileall -q erpnext/construcontrol
          node --check erpnext/public/js/construcontrol_admin_corrections.js
          node --check erpnext/construcontrol/page/construcontrol_migration_console/construcontrol_migration_console.js

      - name: Publish exact inventory
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/architecture/file_inventory.json
          git commit -m 'chore(hotfix): correct final inventory'
          git push origin HEAD:hotfix/construcontrol-v1.0.1-admin-corrections
