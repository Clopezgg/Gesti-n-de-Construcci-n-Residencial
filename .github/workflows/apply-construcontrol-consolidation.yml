name: Validate ConstruControl current tree

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-construcontrol-consolidation.yml
      - scripts/validate_*.py
      - erpnext/construcontrol/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: construcontrol-current-tree-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  apply_financial_history_batch:
    if: github.event_name == 'pull_request' && github.head_ref == 'hotfix/construcontrol-v1.0.1-admin-corrections'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/construcontrol-v1.0.1-admin-corrections
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Apply exact FI01 and payable history patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          printf '%s' '' | base64 -d | gzip -d > "$RUNNER_TEMP/financial-history.patch"
          git apply --check "$RUNNER_TEMP/financial-history.patch"
          git apply --whitespace=error-all "$RUNNER_TEMP/financial-history.patch"
          python - <<'PYCODE'
          from pathlib import Path

          target = Path("erpnext/construcontrol/tests/runtime_smoke.py")
          text = target.read_text(encoding="utf-8")
          old = (
              "from frappe.utils import cint, get_datetime, now_datetime, today\n"
              "from frappe.utils.password import passlibctx\n"
              "from frappe.utils.file_manager import save_file\n"
          )
          new = (
              "from frappe.utils import cint, get_datetime, now_datetime, today\n"
              "from frappe.utils.file_manager import save_file\n"
              "from frappe.utils.password import passlibctx\n"
          )
          count = text.count(old)
          if count != 1:
              raise SystemExit(f"runtime import order: expected one match, found {count}")
          target.write_text(text.replace(old, new, 1), encoding="utf-8")
          PYCODE
          git show "${SOURCE_SHA}^:.github/workflows/apply-construcontrol-consolidation.yml" > .github/workflows/apply-construcontrol-consolidation.yml

      - name: Apply repository formatters without hiding failures
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check pre-commit==3.8.0
          set +e
          pre-commit run --all-files --show-diff-on-failure
          first_status="$?"
          set -e
          if [[ "$first_status" != "0" && -z "$(git status --short)" ]]; then
            exit "$first_status"
          fi
          pre-commit run --all-files --show-diff-on-failure

      - name: Regenerate inventory and validate focused batch
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_file_inventory.py
          pre-commit run --all-files --show-diff-on-failure
          python -m compileall -q erpnext/construcontrol scripts
          python -m unittest discover -s erpnext/construcontrol/tests -p 'test_*_standalone.py' -v
          find erpnext/public/js -maxdepth 1 -type f -name 'construcontrol*.js' -print0 | xargs -0 -r -n1 node --check
          find erpnext/construcontrol/page -type f -name '*.js' -print0 | xargs -0 -r -n1 node --check
          python scripts/validate_repository.py
          python scripts/validate_construcontrol_integration.py
          python scripts/validate_construcontrol_completion.py
          python scripts/validate_construcontrol_architecture.py
          python scripts/validate_construcontrol_data_contract.py
          python scripts/validate_construcontrol_product.py
          python scripts/validate_github_governance.py
          git diff --check

      - name: Commit focused batch to the existing branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          test -n "$(git diff --cached --name-only)"
          git commit -m "fix(admin): preserve payable financial history"
          git push origin HEAD:hotfix/construcontrol-v1.0.1-admin-corrections

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.2

      - name: Validate the published repository tree without transport payloads
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="$RUNNER_TEMP/construcontrol-current-tree"
          mkdir -p "$artifact_dir"
          actual_sha="$(git rev-parse HEAD)"
          test "$actual_sha" = "$SOURCE_SHA"
          test -z "$(git status --short)"
          {
            echo "source_sha=$actual_sha"
            echo "validated_at=$(date -u +%FT%TZ)"
            echo "working_tree_before=0"
          } > "$artifact_dir/report.txt"
          set +e
          (
            set -euo pipefail
            python scripts/validate_repository.py
            python scripts/validate_construcontrol_integration.py
            python scripts/validate_construcontrol_completion.py
            python scripts/validate_construcontrol_architecture.py
            python scripts/validate_construcontrol_data_contract.py
            python scripts/validate_construcontrol_product.py
            python scripts/validate_github_governance.py
            python -m unittest discover -s erpnext/construcontrol/tests -p 'test_*_standalone.py' -v
            python -m compileall -q erpnext/construcontrol scripts
            find erpnext/public/js -maxdepth 1 -type f -name 'construcontrol*.js' -print0 | xargs -0 -r -n1 node --check
            find erpnext/construcontrol/page -type f -name '*.js' -print0 | xargs -0 -r -n1 node --check
            git diff --check
            git diff --exit-code
            git diff --cached --exit-code
            test -z "$(git status --short)"
          ) 2>&1 | tee "$artifact_dir/validation.log"
          status="${PIPESTATUS[0]}"
          set -e
          echo "exit_code=$status" >> "$artifact_dir/report.txt"
          if [[ "$status" = "0" ]]; then
            echo "result=passed" >> "$artifact_dir/report.txt"
          else
            echo "result=failed" >> "$artifact_dir/report.txt"
          fi
          exit "$status"

      - name: Upload current-tree evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: construcontrol-current-tree-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/construcontrol-current-tree/
          if-no-files-found: error
          retention-days: 14
