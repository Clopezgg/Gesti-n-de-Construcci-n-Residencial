name: Validate ConstruControl current tree

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-construcontrol-consolidation.yml
      - scripts/validate_*.py
      - erpnext/construcontrol/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: construcontrol-current-tree-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  apply_runtime_fixture:
    if: github.event_name == 'pull_request' && github.head_ref == 'hotfix/construcontrol-v1.0.1-admin-corrections'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/construcontrol-v1.0.1-admin-corrections
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply validated runtime fixture and formatting patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          cat > "$RUNNER_TEMP/runtime-smoke.patch" <<'PATCH'
          --- a/erpnext/construcontrol/tests/runtime_smoke.py
          +++ b/erpnext/construcontrol/tests/runtime_smoke.py
          @@ -7,11 +7,15 @@
           from pathlib import Path
           
           import frappe
          -from frappe.utils import cint, now_datetime, today
          +from frappe.utils import cint, get_datetime, now_datetime, today
          +from frappe.utils.password import passlibctx
           from frappe.utils.file_manager import save_file
           
           from erpnext.construcontrol.access import assert_project_access, project_filter
          -from erpnext.construcontrol.admin_correction_security import get_security_status
          +from erpnext.construcontrol.admin_correction_security import (
          +	get_security_status,
          +	require_authorization_token,
          +)
           from erpnext.construcontrol.admin_corrections import _token_key, preview_expense_correction
           from erpnext.construcontrol.admin_expense_operations import execute_expense_correction
           from erpnext.construcontrol.admin_supplier_corrections import (
          @@ -48,6 +52,7 @@
           )
           
           _REQUIRED_DOCTYPES = (
          +	"CC Project Profile",
           	"CC Funding Source",
           	"CC Expense Control",
           	"CC Payable Control",
          @@ -90,6 +95,75 @@
           	return str(document.name)
           
           
          +def _ensure_test_project_profile(project: str, marker: str) -> str:
          +	existing = frappe.db.get_value(
          +		"CC Project Profile",
          +		{"project": project, "is_logically_deleted": 0},
          +		"name",
          +	)
          +	if existing:
          +		return str(existing)
          +
          +	project_row = frappe.db.get_value(
          +		"Project", project, ["project_name", "company"], as_dict=True
          +	) or {}
          +	meta = frappe.get_meta("CC Project Profile")
          +	candidates = {
          +		"project": project,
          +		"project_name": project_row.get("project_name") or project,
          +		"company": project_row.get("company"),
          +		"original_budget_hnl": 1000,
          +		"updated_budget_hnl": 1000,
          +		"start_date": today(),
          +		"planned_start_date": today(),
          +		"is_current": 1,
          +		"is_logically_deleted": 0,
          +		"source_key": f"runtime:project-profile:{marker}",
          +		"source_id": f"RUNTIME-PROFILE-{marker}",
          +		"payload_json": "{}",
          +	}
          +	values = {
          +		"doctype": "CC Project Profile",
          +		**{key: value for key, value in candidates.items() if value is not None and meta.has_field(key)},
          +	}
          +	for field in meta.fields:
          +		fieldname = str(field.fieldname or "")
          +		fieldtype = str(field.fieldtype or "")
          +		if not field.reqd or not fieldname or fieldname in values:
          +			continue
          +		if fieldtype in {"Data", "Small Text", "Text", "Long Text"}:
          +			values[fieldname] = "ConstruControl CI"
          +		elif fieldtype in {"Currency", "Float", "Int", "Percent"}:
          +			values[fieldname] = 0
          +		elif fieldtype == "Check":
          +			values[fieldname] = 0
          +		elif fieldtype == "Date":
          +			values[fieldname] = today()
          +		elif fieldtype == "Datetime":
          +			values[fieldname] = now_datetime()
          +		elif fieldtype == "Select":
          +			options = [row.strip() for row in str(field.options or "").splitlines() if row.strip()]
          +			if options:
          +				values[fieldname] = options[0]
          +		elif fieldtype == "Link":
          +			options = str(field.options or "").strip()
          +			if options == "Project":
          +				values[fieldname] = project
          +			elif options == "Company" and project_row.get("company"):
          +				values[fieldname] = project_row.get("company")
          +			elif options == "User":
          +				values[fieldname] = "Administrator"
          +			elif options and frappe.db.exists("DocType", options):
          +				linked = frappe.db.get_value(options, {}, "name")
          +				if linked:
          +					values[fieldname] = linked
          +
          +	document = frappe.get_doc(values)
          +	document.flags.ignore_construcontrol_audit = True
          +	document.insert(ignore_permissions=True, ignore_mandatory=True)
          +	return str(document.name)
          +
          +
           def _verify_schema_metadata() -> dict[str, object]:
           	runtime_dir = Path(__file__).resolve().parents[1] / "runtime"
           	contract = load_runtime_contract(runtime_dir)
          @@ -355,17 +429,90 @@
           		project,
           		is_private=1,
           	)
          +	settings = frappe.get_single("ConstruControl Settings")
          +	pin_updated_at = now_datetime()
          +	for fieldname, value in {
          +		"correction_pin_hash": passlibctx.hash("726401"),
          +		"correction_access_enabled": 1,
          +		"correction_pin_updated_at": pin_updated_at,
          +		"correction_failed_attempts": 0,
          +		"correction_locked_until": None,
          +	}.items():
          +		if settings.meta.has_field(fieldname):
          +			settings.set(fieldname, value)
          +	settings.flags.ignore_construcontrol_audit = True
          +	settings.save(ignore_permissions=True)
          +
           	token = f"runtime-correction-{marker}"
           	authorization_id = f"CCA-RUNTIME-{marker.upper()}"
          +	pin_revision = str(get_datetime(pin_updated_at))
           	frappe.cache.set_value(
           		_token_key(token),
           		{
           			"session_id": str(frappe.session.sid or ""),
           			"authorization_id": authorization_id,
           			"expires_at": now_datetime() + timedelta(minutes=10),
          +			"pin_revision": pin_revision,
           		},
           		expires_in_sec=600,
           	)
          +
          +	def expect_token_denied(candidate: str, label: str) -> None:
          +		denied = 0
          +		try:
          +			require_authorization_token(candidate)
          +		except frappe.PermissionError:
          +			denied = 1
          +		_assert(denied == 1, label)
          +
          +	expired_token = f"runtime-expired-{marker}"
          +	frappe.cache.set_value(
          +		_token_key(expired_token),
          +		{
          +			"session_id": str(frappe.session.sid or ""),
          +			"authorization_id": f"CCA-EXPIRED-{marker.upper()}",
          +			"expires_at": now_datetime() - timedelta(seconds=1),
          +			"pin_revision": pin_revision,
          +		},
          +		expires_in_sec=600,
          +	)
          +	expect_token_denied(expired_token, "Expired correction token was accepted")
          +
          +	foreign_token = f"runtime-foreign-session-{marker}"
          +	frappe.cache.set_value(
          +		_token_key(foreign_token),
          +		{
          +			"session_id": f"foreign-{marker}",
          +			"authorization_id": f"CCA-FOREIGN-{marker.upper()}",
          +			"expires_at": now_datetime() + timedelta(minutes=10),
          +			"pin_revision": pin_revision,
          +		},
          +		expires_in_sec=600,
          +	)
          +	expect_token_denied(foreign_token, "Foreign-session correction token was accepted")
          +
          +	rotated_token = f"runtime-rotated-{marker}"
          +	frappe.cache.set_value(
          +		_token_key(rotated_token),
          +		{
          +			"session_id": str(frappe.session.sid or ""),
          +			"authorization_id": f"CCA-ROTATED-{marker.upper()}",
          +			"expires_at": now_datetime() + timedelta(minutes=10),
          +			"pin_revision": pin_revision,
          +		},
          +		expires_in_sec=600,
          +	)
          +	settings.correction_pin_updated_at = pin_updated_at + timedelta(seconds=1)
          +	settings.flags.ignore_construcontrol_audit = True
          +	settings.save(ignore_permissions=True)
          +	expect_token_denied(rotated_token, "Token survived correction PIN rotation")
          +	settings.correction_pin_updated_at = pin_updated_at
          +	settings.flags.ignore_construcontrol_audit = True
          +	settings.save(ignore_permissions=True)
          +	_assert(
          +		require_authorization_token(token).get("authorization_id") == authorization_id,
          +		"Valid correction token was rejected",
          +	)
           	try:
           		historical_supplier = create_supplier(f"Proveedor histórico {marker}")
           		historical_expense = frappe.get_doc(
          @@ -587,6 +734,7 @@
           					"company": company,
           				}
           			).insert(ignore_permissions=True)
          +			_ensure_test_project_profile(project.name, marker)
           
           			fund = frappe.get_doc(
           				{
          PATCH
          git apply --whitespace=error-all "$RUNNER_TEMP/runtime-smoke.patch"
          python -m pip install --disable-pip-version-check ruff==0.2.0 PyYAML==6.0.2
          python -m ruff format \
            erpnext/construcontrol/admin_correction_security.py \
            erpnext/construcontrol/admin_expense_operations.py \
            erpnext/construcontrol/tests/runtime_smoke.py

          rm -f .github/workflows/hotfix-v1-0-1-apply-runtime-fixture.yml
          git show "${SOURCE_SHA}^:.github/workflows/apply-construcontrol-consolidation.yml" \
            > .github/workflows/apply-construcontrol-consolidation.yml
          python scripts/generate_file_inventory.py

          python -m compileall -q erpnext/construcontrol/admin_correction_security.py \
            erpnext/construcontrol/admin_expense_operations.py \
            erpnext/construcontrol/tests/runtime_smoke.py
          python erpnext/construcontrol/tests/test_admin_corrections_contract_standalone.py
          python scripts/validate_repository.py
          python scripts/validate_construcontrol_integration.py
          python scripts/validate_construcontrol_completion.py
          python scripts/validate_construcontrol_architecture.py
          python scripts/validate_construcontrol_data_contract.py
          python scripts/validate_construcontrol_product.py
          python scripts/validate_github_governance.py
          git diff --check

      - name: Commit focused patch to the existing branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          test -n "$(git diff --cached --name-only)"
          git commit -m "fix(admin): repair runtime correction validation"
          git push origin HEAD:hotfix/construcontrol-v1.0.1-admin-corrections

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.2

      - name: Validate the published repository tree without transport payloads
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="$RUNNER_TEMP/construcontrol-current-tree"
          mkdir -p "$artifact_dir"
          actual_sha="$(git rev-parse HEAD)"
          test "$actual_sha" = "$SOURCE_SHA"
          test -z "$(git status --short)"
          {
            echo "source_sha=$actual_sha"
            echo "validated_at=$(date -u +%FT%TZ)"
            echo "working_tree_before=0"
          } > "$artifact_dir/report.txt"
          set +e
          (
            set -euo pipefail
            python scripts/validate_repository.py
            python scripts/validate_construcontrol_integration.py
            python scripts/validate_construcontrol_completion.py
            python scripts/validate_construcontrol_architecture.py
            python scripts/validate_construcontrol_data_contract.py
            python scripts/validate_construcontrol_product.py
            python scripts/validate_github_governance.py
            python -m unittest discover -s erpnext/construcontrol/tests -p 'test_*_standalone.py' -v
            python -m compileall -q erpnext/construcontrol scripts
            find erpnext/public/js -maxdepth 1 -type f -name 'construcontrol*.js' -print0 | xargs -0 -r -n1 node --check
            find erpnext/construcontrol/page -type f -name '*.js' -print0 | xargs -0 -r -n1 node --check
            git diff --check
            git diff --exit-code
            git diff --cached --exit-code
            test -z "$(git status --short)"
          ) 2>&1 | tee "$artifact_dir/validation.log"
          status="${PIPESTATUS[0]}"
          set -e
          echo "exit_code=$status" >> "$artifact_dir/report.txt"
          if [[ "$status" = "0" ]]; then
            echo "result=passed" >> "$artifact_dir/report.txt"
          else
            echo "result=failed" >> "$artifact_dir/report.txt"
          fi
          exit "$status"

      - name: Upload current-tree evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: construcontrol-current-tree-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/construcontrol-current-tree/
          if-no-files-found: error
          retention-days: 14
