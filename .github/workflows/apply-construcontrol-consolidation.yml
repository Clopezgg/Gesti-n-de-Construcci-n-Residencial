name: Validate ConstruControl current tree

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-construcontrol-consolidation.yml
      - scripts/validate_*.py
      - erpnext/construcontrol/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: construcontrol-current-tree-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  apply_financial_history_batch:
    if: github.event_name == 'pull_request' && github.head_ref == 'hotfix/construcontrol-v1.0.1-admin-corrections'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/construcontrol-v1.0.1-admin-corrections
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Recover and apply the exact financial history patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          python - <<'PY'
          import base64
          import gzip
          import os
          import re
          import subprocess
          from pathlib import Path

          source_sha = os.environ["SOURCE_SHA"]
          workflow_path = ".github/workflows/apply-construcontrol-consolidation.yml"
          parent = subprocess.check_output(
              ["git", "show", f"{source_sha}^:{workflow_path}"], text=True
          )
          match = re.search(
              r"printf '%s' '([^']+)' \| base64 -d \| gzip -d", parent
          )
          if not match:
              raise SystemExit("The parent transport does not contain the expected patch payload")
          Path("/tmp/financial-history.patch").write_bytes(
              gzip.decompress(base64.b64decode(match.group(1)))
          )
          PY
          git apply --check /tmp/financial-history.patch
          git apply --whitespace=error-all /tmp/financial-history.patch
          python - <<'PY'
          from pathlib import Path

          target = Path("erpnext/construcontrol/tests/runtime_smoke.py")
          text = target.read_text(encoding="utf-8")
          old = (
              "from frappe.utils import cint, get_datetime, now_datetime, today\n"
              "from frappe.utils.password import passlibctx\n"
              "from frappe.utils.file_manager import save_file\n"
          )
          new = (
              "from frappe.utils import cint, get_datetime, now_datetime, today\n"
              "from frappe.utils.file_manager import save_file\n"
              "from frappe.utils.password import passlibctx\n"
          )
          count = text.count(old)
          if count != 1:
              raise SystemExit(f"runtime import order: expected one match, found {count}")
          target.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          git show "${SOURCE_SHA}^^:.github/workflows/apply-construcontrol-consolidation.yml" \
            > .github/workflows/apply-construcontrol-consolidation.yml

      - name: Capture two complete pre-commit passes
        shell: bash
        run: |
          set -uo pipefail
          diagnostic_dir="$RUNNER_TEMP/batch2-lint"
          mkdir -p "$diagnostic_dir"
          python -m pip install --disable-pip-version-check pre-commit==3.8.0 \
            2>&1 | tee "$diagnostic_dir/install.log"
          install_status="${PIPESTATUS[0]}"
          if [[ "$install_status" != "0" ]]; then
            echo "$install_status" > "$diagnostic_dir/final-status.txt"
            exit 0
          fi

          pre-commit run --all-files --show-diff-on-failure \
            2>&1 | tee "$diagnostic_dir/pre-commit-first.log"
          first_status="${PIPESTATUS[0]}"
          git status --short > "$diagnostic_dir/git-status-after-first.txt"
          git diff --binary > "$diagnostic_dir/patch-after-first.diff"

          pre-commit run --all-files --show-diff-on-failure \
            2>&1 | tee "$diagnostic_dir/pre-commit-second.log"
          second_status="${PIPESTATUS[0]}"
          git status --short > "$diagnostic_dir/git-status-after-second.txt"
          git diff --binary > "$diagnostic_dir/patch-after-second.diff"
          printf 'first=%s\nsecond=%s\n' "$first_status" "$second_status" \
            > "$diagnostic_dir/statuses.txt"
          echo "$second_status" > "$diagnostic_dir/final-status.txt"
          exit 0

      - name: Upload exact batch lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch2-lint-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/batch2-lint/
          if-no-files-found: error
          retention-days: 14

      - name: Require a clean second pre-commit pass
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat "$RUNNER_TEMP/batch2-lint/final-status.txt")" = "0"

      - name: Regenerate inventory and validate the focused batch
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_file_inventory.py
          pre-commit run --all-files --show-diff-on-failure
          python -m compileall -q erpnext/construcontrol scripts
          python -m unittest discover -s erpnext/construcontrol/tests -p 'test_*_standalone.py' -v
          find erpnext/public/js -maxdepth 1 -type f -name 'construcontrol*.js' -print0 | xargs -0 -r -n1 node --check
          find erpnext/construcontrol/page -type f -name '*.js' -print0 | xargs -0 -r -n1 node --check
          python scripts/validate_repository.py
          python scripts/validate_construcontrol_integration.py
          python scripts/validate_construcontrol_completion.py
          python scripts/validate_construcontrol_architecture.py
          python scripts/validate_construcontrol_data_contract.py
          python scripts/validate_construcontrol_product.py
          python scripts/validate_github_governance.py
          git diff --check

      - name: Commit focused batch to the existing branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          test -n "$(git diff --cached --name-only)"
          git commit -m "fix(admin): preserve payable financial history"
          git push origin HEAD:hotfix/construcontrol-v1.0.1-admin-corrections
