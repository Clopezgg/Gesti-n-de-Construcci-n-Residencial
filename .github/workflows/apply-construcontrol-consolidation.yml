name: Validate ConstruControl current tree

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-construcontrol-consolidation.yml
      - scripts/validate_*.py
      - erpnext/construcontrol/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: construcontrol-current-tree-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  apply_admin_idempotency_batch:
    if: github.event_name == 'pull_request' && github.head_ref == 'hotfix/construcontrol-v1.0.1-admin-corrections'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/construcontrol-v1.0.1-admin-corrections
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply exact source replacements
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          cat > "$RUNNER_TEMP/apply_batch.py" <<'PY'
          from pathlib import Path


          def replace_once(path: str, old: str, new: str, label: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "erpnext/construcontrol/admin_correction_security.py",
              '''\tpayload = frappe.cache.get_value(_token_key(token), expires=True) if token else None\n\tif not isinstance(payload, dict) or payload.get("session_id") != _session_id():\n\t\t_delete_token(token)\n\t\tfrappe.throw(_("La autorización expiró o no pertenece a esta sesión."), frappe.PermissionError)\n''',
              '''\tpayload = frappe.cache.get_value(_token_key(token), expires=True) if token else None\n\tif not isinstance(payload, dict):\n\t\tfrappe.throw(_("La autorización expiró o no existe."), frappe.PermissionError)\n\tif payload.get("session_id") != _session_id():\n\t\t# A request from another session must not revoke the legitimate session's token.\n\t\tfrappe.throw(_("La autorización no pertenecece a esta sesión."), frappe.PermissionError)\n'''.replace("pertenecece", "pertenece"),
              "session mismatch token preservation",
          )
          replace_once(
              "erpnext/construcontrol/admin_expense_operations.py",
              '''\tauthorization = _require_token(authorization_token)\n\tpayload = _prepare(str(expense_name or ""), operation, changes, reason, evidence)\n\tif not secrets.compare_digest(str(preview_hash or ""), payload["preview_hash"]):\n''',
              '''\tauthorization = _require_token(authorization_token)\n\texpense_name = str(expense_name or "").strip()\n\toperation_key = str(operation or "correct").lower()\n\taction = f"ADMIN_{operation_key.upper()}"\n\texisting = _receipt(\n\t\tauthorization_id=authorization["authorization_id"],\n\t\tpreview_hash=str(preview_hash or ""),\n\t\taction=action,\n\t\trecord_id=expense_name,\n\t)\n\tif existing:\n\t\treturn {\n\t\t\t**existing,\n\t\t\t"idempotent": True,\n\t\t\t"operation_result": "ALREADY_APPLIED",\n\t\t\t"operation": operation_key,\n\t\t\t"authorization_id": authorization["authorization_id"],\n\t\t}\n\tpayload = _prepare(expense_name, operation_key, changes, reason, evidence)\n\tif not secrets.compare_digest(str(preview_hash or ""), payload["preview_hash"]):\n''',
              "single receipt before prepare",
          )
          replace_once(
              "erpnext/construcontrol/admin_expense_operations.py",
              '''\t\t_lock_expense_row(payload["expense"])\n\t\taction = f"ADMIN_{payload['operation'].upper()}"\n\t\texisting = _receipt(\n\t\t\tauthorization_id=authorization["authorization_id"],\n\t\t\tpreview_hash=payload["preview_hash"],\n''',
              '''\t\t_lock_expense_row(payload["expense"])\n\t\texisting = _receipt(\n\t\t\tauthorization_id=authorization["authorization_id"],\n\t\t\tpreview_hash=str(preview_hash or ""),\n''',
              "single receipt recheck",
          )
          replace_once(
              "erpnext/construcontrol/admin_expense_operations.py",
              '''\tauthorization = _require_token(authorization_token)\n\tpayload = preview_expense_batch(items, reason, evidence, authorization_token)\n\tif not secrets.compare_digest(str(preview_hash or ""), payload["preview_hash"]):\n''',
              '''\tauthorization = _require_token(authorization_token)\n\texisting = _receipt(\n\t\tauthorization_id=authorization["authorization_id"],\n\t\tpreview_hash=str(preview_hash or ""),\n\t\taction="ADMIN_EXPENSE_BATCH",\n\t\trecord_id=authorization["authorization_id"],\n\t)\n\tif existing:\n\t\treturn {\n\t\t\t**existing,\n\t\t\t"idempotent": True,\n\t\t\t"operation_result": "ALREADY_APPLIED",\n\t\t\t"authorization_id": authorization["authorization_id"],\n\t\t}\n\tpayload = preview_expense_batch(items, reason, evidence, authorization_token)\n\tif not secrets.compare_digest(str(preview_hash or ""), payload["preview_hash"]):\n''',
              "batch receipt before preview",
          )
          replace_once(
              "erpnext/construcontrol/admin_expense_operations.py",
              '''\t\texisting = _receipt(\n\t\t\tauthorization_id=authorization["authorization_id"],\n\t\t\tpreview_hash=payload["preview_hash"],\n\t\t\taction="ADMIN_EXPENSE_BATCH",\n''',
              '''\t\texisting = _receipt(\n\t\t\tauthorization_id=authorization["authorization_id"],\n\t\t\tpreview_hash=str(preview_hash or ""),\n\t\t\taction="ADMIN_EXPENSE_BATCH",\n''',
              "batch receipt recheck",
          )
          replace_once(
              "erpnext/construcontrol/tests/runtime_smoke.py",
              '''\tsettings.flags.ignore_construcontrol_audit = True\n\tsettings.save(ignore_permissions=True)\n\n\ttoken = f"runtime-correction-{marker}"\n\tauthorization_id = f"CCA-RUNTIME-{marker.upper()}"\n\tpin_revision = str(get_datetime(pin_updated_at))\n''',
              '''\tsettings.flags.ignore_construcontrol_audit = True\n\tsettings.save(ignore_permissions=True)\n\tsettings.reload()\n\tpin_updated_at = get_datetime(settings.correction_pin_updated_at)\n\n\ttoken = f"runtime-correction-{marker}"\n\tauthorization_id = f"CCA-RUNTIME-{marker.upper()}"\n\tpin_revision = str(pin_updated_at)\n''',
              "runtime normalized pin revision",
          )
          replace_once(
              "erpnext/construcontrol/tests/runtime_smoke.py",
              '''\tsettings.correction_pin_updated_at = pin_updated_at + timedelta(seconds=1)\n\tsettings.flags.ignore_construcontrol_audit = True\n\tsettings.save(ignore_permissions=True)\n\texpect_token_denied(rotated_token, "Token survived correction PIN rotation")\n\tsettings.correction_pin_updated_at = pin_updated_at\n\tsettings.flags.ignore_construcontrol_audit = True\n\tsettings.save(ignore_permissions=True)\n''',
              '''\tsettings.correction_pin_updated_at = pin_updated_at + timedelta(seconds=1)\n\tsettings.flags.ignore_construcontrol_audit = True\n\tsettings.save(ignore_permissions=True)\n\tsettings.reload()\n\texpect_token_denied(rotated_token, "Token survived correction PIN rotation")\n\tsettings.correction_pin_updated_at = pin_updated_at\n\tsettings.flags.ignore_construcontrol_audit = True\n\tsettings.save(ignore_permissions=True)\n\tsettings.reload()\n''',
              "runtime rotation reload",
          )
          replace_once(
              "erpnext/construcontrol/tests/runtime_smoke.py",
              '''\t\texpense_result = execute_expense_correction(\n\t\t\t**expense_args,\n\t\t\tpreview_hash=preview["preview_hash"],\n\t\t)\n\t\thistorical_expense.reload()\n''',
              '''\t\texpense_result = execute_expense_correction(\n\t\t\t**expense_args,\n\t\t\tpreview_hash=preview["preview_hash"],\n\t\t)\n\t\taudit_filters = {\n\t\t\t"record_type": "CC Expense Control",\n\t\t\t"record_id": historical_expense.name,\n\t\t\t"origin": "ADMIN_CORRECTION",\n\t\t\t"correlation_id": authorization_id,\n\t\t}\n\t\taudit_count = frappe.db.count("CC Audit Log", audit_filters)\n\t\trepeated_expense_result = execute_expense_correction(\n\t\t\t**expense_args,\n\t\t\tpreview_hash=preview["preview_hash"],\n\t\t)\n\t\thistorical_expense.reload()\n''',
              "runtime repeated correction",
          )
          replace_once(
              "erpnext/construcontrol/tests/runtime_smoke.py",
              '''\t\t_assert(\n\t\t\texpense_result["authorization_id"] == authorization_id,\n\t\t\t"Expense result lost the authorization identifier",\n\t\t)\n\n\t\tcanonical = create_supplier''',
              '''\t\t_assert(\n\t\t\texpense_result["authorization_id"] == authorization_id,\n\t\t\t"Expense result lost the authorization identifier",\n\t\t)\n\t\t_assert(bool(repeated_expense_result.get("idempotent")), "Repeated correction was not idempotent")\n\t\t_assert(\n\t\t\trepeated_expense_result.get("operation_result") == "ALREADY_APPLIED",\n\t\t\t"Repeated correction did not return the durable receipt",\n\t\t)\n\t\t_assert(\n\t\t\tfrappe.db.count("CC Audit Log", audit_filters) == audit_count,\n\t\t\t"Repeated correction created a duplicate audit event",\n\t\t)\n\n\t\tcanonical = create_supplier''',
              "runtime idempotency assertions",
          )
          replace_once(
              "erpnext/construcontrol/tests/test_admin_corrections_mariadb.py",
              'from frappe.utils import now_datetime, today\n',
              'from frappe.utils import get_datetime, now_datetime, today\nfrom frappe.utils.password import passlibctx\n',
              "mariadb imports utils",
          )
          replace_once(
              "erpnext/construcontrol/tests/test_admin_corrections_mariadb.py",
              'from erpnext.construcontrol.tests.runtime_smoke import _ensure_test_company\n',
              'from erpnext.construcontrol.tests.runtime_smoke import (\n\t_ensure_test_company,\n\t_ensure_test_project_profile,\n)\n',
              "mariadb project profile import",
          )
          replace_once(
              "erpnext/construcontrol/tests/test_admin_corrections_mariadb.py",
              '''\t\t).insert(ignore_permissions=True)\n\t\tself.token = f"token-{self.marker}"\n\t\tself.authorization_id = f"CCA-TEST-{self.marker.upper()}"\n\t\tfrappe.cache.set_value(\n''',
              '''\t\t).insert(ignore_permissions=True)\n\t\t_ensure_test_project_profile(self.project.name, self.marker)\n\t\tsettings = frappe.get_single("ConstruControl Settings")\n\t\tpin_updated_at = now_datetime()\n\t\tfor fieldname, value in {\n\t\t\t"correction_pin_hash": passlibctx.hash("726401"),\n\t\t\t"correction_access_enabled": 1,\n\t\t\t"correction_pin_updated_at": pin_updated_at,\n\t\t\t"correction_failed_attempts": 0,\n\t\t\t"correction_locked_until": None,\n\t\t}.items():\n\t\t\tif settings.meta.has_field(fieldname):\n\t\t\t\tsettings.set(fieldname, value)\n\t\tsettings.flags.ignore_construcontrol_audit = True\n\t\tsettings.save(ignore_permissions=True)\n\t\tsettings.reload()\n\t\tpin_revision = str(get_datetime(settings.correction_pin_updated_at))\n\t\tself.token = f"token-{self.marker}"\n\t\tself.authorization_id = f"CCA-TEST-{self.marker.upper()}"\n\t\tfrappe.cache.set_value(\n''',
              "mariadb setup security profile",
          )
          replace_once(
              "erpnext/construcontrol/tests/test_admin_corrections_mariadb.py",
              '''\t\t\t\t"authorization_id": self.authorization_id,\n\t\t\t\t"expires_at": now_datetime() + timedelta(minutes=10),\n\t\t\t},\n''',
              '''\t\t\t\t"authorization_id": self.authorization_id,\n\t\t\t\t"expires_at": now_datetime() + timedelta(minutes=10),\n\t\t\t\t"pin_revision": pin_revision,\n\t\t\t},\n''',
              "mariadb token revision",
          )
          replace_once(
              "erpnext/construcontrol/tests/test_admin_corrections_mariadb.py",
              '''\t\tresult = execute_expense_correction(**args, preview_hash=preview["preview_hash"])\n\n\t\texpense.reload()\n''',
              '''\t\tresult = execute_expense_correction(**args, preview_hash=preview["preview_hash"])\n\t\taudit_filters = {\n\t\t\t"record_type": "CC Expense Control",\n\t\t\t"record_id": expense_name,\n\t\t\t"origin": "ADMIN_CORRECTION",\n\t\t\t"correlation_id": self.authorization_id,\n\t\t}\n\t\taudit_count = frappe.db.count("CC Audit Log", audit_filters)\n\t\trepeated = execute_expense_correction(**args, preview_hash=preview["preview_hash"])\n\n\t\texpense.reload()\n''',
              "mariadb repeated correction",
          )
          replace_once(
              "erpnext/construcontrol/tests/test_admin_corrections_mariadb.py",
              '''\t\tself.assertEqual(result["authorization_id"], self.authorization_id)\n\t\tself.assertTrue(\n''',
              '''\t\tself.assertEqual(result["authorization_id"], self.authorization_id)\n\t\tself.assertTrue(repeated["idempotent"])\n\t\tself.assertEqual(repeated["operation_result"], "ALREADY_APPLIED")\n\t\tself.assertEqual(frappe.db.count("CC Audit Log", audit_filters), audit_count)\n\t\tself.assertTrue(\n''',
              "mariadb idempotency assertions",
          )
          replace_once(
              "erpnext/construcontrol/tests/test_admin_corrections_contract_standalone.py",
              '''\t\tself.assertIn('"session_id": _session_id()', self.security)\n\t\tself.assertIn("expires_in_sec=_AUTH_TTL", self.security)\n''',
              '''\t\tself.assertIn('"session_id": _session_id()', self.security)\n\t\tself.assertIn("expires_in_sec=_AUTH_TTL", self.security)\n\t\tself.assertIn("must not revoke the legitimate session's token", self.security)\n''',
              "standalone session preservation",
          )
          replace_once(
              "erpnext/construcontrol/tests/test_admin_corrections_contract_standalone.py",
              '''\t\tself.assertIn("def _receipt(", self.expenses)\n\t\tself.assertIn('"preview_hash": preview_hash', self.expenses)\n''',
              '''\t\tself.assertIn("def _receipt(", self.expenses)\n\t\tself.assertGreaterEqual(self.expenses.count("existing = _receipt("), 4)\n\t\tself.assertIn('"preview_hash": preview_hash', self.expenses)\n''',
              "standalone durable receipt",
          )
          PY
          python "$RUNNER_TEMP/apply_batch.py"

      - name: Format and restore the validation workflow
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check ruff==0.2.0 PyYAML==6.0.2
          python -m ruff format \
            erpnext/construcontrol/admin_correction_security.py \
            erpnext/construcontrol/admin_expense_operations.py \
            erpnext/construcontrol/tests/runtime_smoke.py \
            erpnext/construcontrol/tests/test_admin_corrections_mariadb.py \
            erpnext/construcontrol/tests/test_admin_corrections_contract_standalone.py
          git show 428b920fb7bbbb897aecb2cd872a56f842c4b3e4:.github/workflows/apply-construcontrol-consolidation.yml \
            > .github/workflows/apply-construcontrol-consolidation.yml
          python scripts/generate_file_inventory.py

      - name: Validate the focused batch
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q \
            erpnext/construcontrol/admin_correction_security.py \
            erpnext/construcontrol/admin_expense_operations.py \
            erpnext/construcontrol/tests/runtime_smoke.py \
            erpnext/construcontrol/tests/test_admin_corrections_mariadb.py \
            erpnext/construcontrol/tests/test_admin_corrections_contract_standalone.py
          python erpnext/construcontrol/tests/test_admin_corrections_contract_standalone.py
          python scripts/validate_repository.py
          python scripts/validate_construcontrol_integration.py
          python scripts/validate_construcontrol_completion.py
          python scripts/validate_construcontrol_architecture.py
          python scripts/validate_construcontrol_data_contract.py
          python scripts/validate_construcontrol_product.py
          python scripts/validate_github_governance.py
          git diff --check

      - name: Commit focused batch to the existing branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          test -n "$(git diff --cached --name-only)"
          git commit -m "fix(admin): enforce durable correction idempotency"
          git push origin HEAD:hotfix/construcontrol-v1.0.1-admin-corrections

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.2

      - name: Validate the published repository tree without transport payloads
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="$RUNNER_TEMP/construcontrol-current-tree"
          mkdir -p "$artifact_dir"
          actual_sha="$(git rev-parse HEAD)"
          test "$actual_sha" = "$SOURCE_SHA"
          test -z "$(git status --short)"
          {
            echo "source_sha=$actual_sha"
            echo "validated_at=$(date -u +%FT%TZ)"
            echo "working_tree_before=0"
          } > "$artifact_dir/report.txt"
          set +e
          (
            set -euo pipefail
            python scripts/validate_repository.py
            python scripts/validate_construcontrol_integration.py
            python scripts/validate_construcontrol_completion.py
            python scripts/validate_construcontrol_architecture.py
            python scripts/validate_construcontrol_data_contract.py
            python scripts/validate_construcontrol_product.py
            python scripts/validate_github_governance.py
            python -m unittest discover -s erpnext/construcontrol/tests -p 'test_*_standalone.py' -v
            python -m compileall -q erpnext/construcontrol scripts
            find erpnext/public/js -maxdepth 1 -type f -name 'construcontrol*.js' -print0 | xargs -0 -r -n1 node --check
            find erpnext/construcontrol/page -type f -name '*.js' -print0 | xargs -0 -r -n1 node --check
            git diff --check
            git diff --exit-code
            git diff --cached --exit-code
            test -z "$(git status --short)"
          ) 2>&1 | tee "$artifact_dir/validation.log"
          status="${PIPESTATUS[0]}"
          set -e
          echo "exit_code=$status" >> "$artifact_dir/report.txt"
          if [[ "$status" = "0" ]]; then
            echo "result=passed" >> "$artifact_dir/report.txt"
          else
            echo "result=failed" >> "$artifact_dir/report.txt"
          fi
          exit "$status"

      - name: Upload current-tree evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: construcontrol-current-tree-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/construcontrol-current-tree/
          if-no-files-found: error
          retention-days: 14
