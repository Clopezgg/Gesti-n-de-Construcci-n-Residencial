name: ConstruControl container verification evidence

on:
  workflow_dispatch:
    inputs:
      gate:
        description: 'Certification gate to execute'
        required: true
        type: choice
        options:
          - A
          - B
          - C
          - FINAL

permissions:
  contents: read

concurrency:
  group: construcontrol-container-${{ github.event.inputs.gate }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build and inspect linux amd64 image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/container
          {
            echo "gate=${{ github.event.inputs.gate }}"
            echo "source_sha=$(git rev-parse HEAD)"
            echo "started_at=$(date -u +%FT%TZ)"
            docker buildx build --platform linux/amd64 --load --tag construcontrol-app:evidence --file Dockerfile .
            docker image inspect construcontrol-app:evidence --format '{{.Architecture}}' | grep -Fx amd64
            docker run --rm --platform linux/amd64 --entrypoint bash construcontrol-app:evidence -lc '
              set -euo pipefail
              test "$(id -un)" = "frappe"
              test "$(uname -m)" = "x86_64"
              test -x /home/frappe/frappe-bench/apps/erpnext/deploy/coolify/init-site.sh
              test -x /home/frappe/frappe-bench/apps/erpnext/deploy/coolify/start-backend.sh
              test -x /home/frappe/frappe-bench/apps/erpnext/deploy/coolify/backup-now.sh
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/hooks.py
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/install.py
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/business_rules.py
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/inventory.py
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/quality.py
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/quality_migration.py
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/closing.py
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/weekly.py
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/users.py
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/finance.py
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/expenses.py
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/construction.py
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/executive.py
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/public/js/construcontrol_mobile.js
              test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/public/css/construcontrol_canonical.css
              python -m py_compile /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/install.py
              python -m py_compile /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/inventory.py
              python -m py_compile /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/quality.py
              python -m py_compile /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/quality_migration.py
              python -m py_compile /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/closing.py
              python -m py_compile /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/weekly.py
              python -m py_compile /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/users.py
              python -m py_compile /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/executive.py
            '
            echo "completed_at=$(date -u +%FT%TZ)"
          } 2>&1 | tee artifacts/container/verification.log

      - name: Upload container evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: construcontrol-container-gate-${{ github.event.inputs.gate }}-${{ github.sha }}
          path: artifacts/container/
          if-no-files-found: error
          retention-days: 14
