name: Read-only non-Python patch control

on:
  pull_request:
    paths:
      - "**.js"
      - "**.css"
      - "**.md"
      - "**.html"
      - "**.csv"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Validate changed non-Python sources without writing repository state
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          git diff --check "$base" HEAD
          if git grep -n '^<<<<<<< ' -- ':!node_modules'; then
            echo "Unresolved merge conflict markers found" >&2
            exit 1
          fi
          git diff --name-only --diff-filter=ACMR "$base" HEAD -- '*.js' \
            | while IFS= read -r file; do
                [[ -z "$file" ]] || node --check "$file"
              done
          test -z "$(git status --short)"
