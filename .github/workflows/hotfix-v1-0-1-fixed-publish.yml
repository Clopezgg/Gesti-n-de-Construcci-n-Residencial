name: Publish corrected ConstruControl v1.0.1 runtime smoke

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: construcontrol-v1-0-1-fixed-publish-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate, normalize and verify exact runtime tests
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/hotfix-v1-0-1-test-wiring.yml')
          lines = path.read_text(encoding='utf-8').splitlines()
          marker = '      - name: Integrate Administrator correction smoke into the existing runtime probe'
          start = lines.index(marker)
          run_index = next(i for i in range(start + 1, len(lines)) if lines[i].strip() == 'run: |')
          block_indent = len(lines[run_index]) - len(lines[run_index].lstrip()) + 2
          block = []
          for line in lines[run_index + 1:]:
              if line.strip() and len(line) - len(line.lstrip()) < block_indent:
                  break
              block.append(line[block_indent:] if len(line) >= block_indent else '')
          Path('/tmp/construcontrol-generate.sh').write_text('\n'.join(block) + '\n', encoding='utf-8')
          PY
          bash /tmp/construcontrol-generate.sh
          python - <<'PY'
          from pathlib import Path

          path = Path('erpnext/construcontrol/tests/runtime_smoke.py')
          text = path.read_text(encoding='utf-8')
          start = text.index('\ndef _verify_admin_corrections(')
          end = text.index('\ndef run()', start)
          helper = text[start:end].replace('\\t', '\t')
          path.write_text(text[:start] + helper + text[end:], encoding='utf-8')
          PY
          pip install ruff==0.2.0
          ruff check --select I --fix \
            erpnext/construcontrol/tests/runtime_smoke.py \
            erpnext/construcontrol/tests/test_admin_corrections_mariadb.py
          ruff format \
            erpnext/construcontrol/tests/runtime_smoke.py \
            erpnext/construcontrol/tests/test_admin_corrections_mariadb.py
          python -m py_compile \
            erpnext/construcontrol/tests/runtime_smoke.py \
            erpnext/construcontrol/tests/test_admin_corrections_mariadb.py
          test "$(git hash-object erpnext/construcontrol/tests/runtime_smoke.py)" = "abfd31860bc0993482fc87b023ac7448552ec55d"
          test "$(git hash-object erpnext/construcontrol/tests/test_admin_corrections_mariadb.py)" = "ae96be999430a046a329198e6adbf181ed0a0bc4"

      - name: Publish only the verified Python files
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            erpnext/construcontrol/tests/runtime_smoke.py \
            erpnext/construcontrol/tests/test_admin_corrections_mariadb.py
          git commit -m 'test(hotfix): exercise corrections in runtime smoke'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
