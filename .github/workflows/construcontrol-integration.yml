name: ConstruControl integration gate
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/validate_construcontrol_integration.py
      - run: python erpnext/construcontrol/tests/test_schema_standalone.py
      - run: python erpnext/construcontrol/tests/test_backup_reader_standalone.py
      - run: python scripts/validate_repository.py
      - run: pip install pyyaml
      - name: Parse deployment files
        run: python -c "import pathlib,yaml; [yaml.safe_load(pathlib.Path(n).read_text()) for n in ('docker-compose.yml','render.yaml','deploy/coolify/docker-compose.yml','deploy/coolify/docker-compose.yaml') if pathlib.Path(n).exists()]"
