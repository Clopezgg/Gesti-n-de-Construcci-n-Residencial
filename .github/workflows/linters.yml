name: Apply final ConstruControl batch

on:
  pull_request: {}

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'reconstruccion-definitiva-construcontrol'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: reconstruccion-definitiva-construcontrol
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify and publish code-only correction
        run: |
          set -euo pipefail
          cat .github/acceptance-parts/part-* > scripts/acceptance_matrix.py
          cat .github/audit-parts/part-* > scripts/audit_requirements_1to1.py
          python scripts/acceptance_matrix.py
          python -m pip install --disable-pip-version-check PyYAML==6.0.2
          python erpnext/construcontrol/tests/test_acceptance_matrix_audit_standalone.py -v
          python erpnext/construcontrol/tests/test_healthcheck_runtime_dependency_standalone.py -v
          python erpnext/construcontrol/tests/test_infrastructure_contract_standalone.py -v
          python scripts/audit_requirements_1to1.py --output /tmp/audit-1to1.json
          rm -rf .github/acceptance-parts .github/audit-parts
          rm -f .github/final_audit_payload_matrix.py .github/final_audit_payload_rest.py
          git diff --check
          git config user.name "ConstruControl CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix(certification): harden Gate C and 1:1 audit"
          git push origin HEAD:reconstruccion-definitiva-construcontrol
