name: Linters

on:
  pull_request: {}

jobs:
  linters:
    name: linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit==3.8.0

      - name: Run pre-commit after the controlled policy checkpoint
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          POLICY_SHA: b29e56fcdc2ce5f5a6a7405fd81d8f87895f74a1
        run: |
          set -euo pipefail
          mkdir -p artifacts/linters
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if git merge-base --is-ancestor "$POLICY_SHA" "$HEAD_SHA"; then
            BASE_SHA="$POLICY_SHA"
          fi
          set +e
          pre-commit run --from-ref "$BASE_SHA" --to-ref "$HEAD_SHA" --show-diff-on-failure \
            2>&1 | tee artifacts/linters/pre-commit.log
          status="${PIPESTATUS[0]}"
          set -e
          git diff --binary > artifacts/linters/pre-commit.patch
          git status --short > artifacts/linters/git-status.txt
          {
            echo "base_sha=$BASE_SHA"
            echo "head_sha=$HEAD_SHA"
            echo "exit_code=$status"
          } > artifacts/linters/result.env
          exit "$status"

      - name: Upload exact pre-commit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linters-${{ github.event.pull_request.head.sha }}
          path: artifacts/linters
          if-no-files-found: error
          retention-days: 30

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip

      - name: Download Semgrep rules
        run: git clone --depth 1 https://github.com/frappe/semgrep-rules.git frappe-semgrep-rules

      - name: Download Semgrep
        run: pip install semgrep

      - name: Run Semgrep rules with exact evidence
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/semgrep
          set +e
          semgrep ci --config ./frappe-semgrep-rules/rules --config r/python.lang.correctness \
            2>&1 | tee artifacts/semgrep/semgrep.log
          status="${PIPESTATUS[0]}"
          set -e
          {
            echo "head_sha=$HEAD_SHA"
            echo "exit_code=$status"
          } > artifacts/semgrep/result.env
          exit "$status"

      - name: Upload exact Semgrep evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-${{ github.event.pull_request.head.sha }}
          path: artifacts/semgrep
          if-no-files-found: error
          retention-days: 30
