name: Linters

on:
  pull_request: {}

jobs:
  linters:
    name: linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit==3.8.0

      - name: Run pre-commit after the controlled policy checkpoint
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          POLICY_SHA: b29e56fcdc2ce5f5a6a7405fd81d8f87895f74a1
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if git merge-base --is-ancestor "$POLICY_SHA" "$HEAD_SHA"; then
            BASE_SHA="$POLICY_SHA"
          fi
          pre-commit run --from-ref "$BASE_SHA" --to-ref "$HEAD_SHA" --show-diff-on-failure

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip

      - name: Download Semgrep rules
        run: git clone --depth 1 https://github.com/frappe/semgrep-rules.git frappe-semgrep-rules

      - name: Download Semgrep
        run: pip install semgrep

      - name: Run Semgrep rules
        run: semgrep ci --config ./frappe-semgrep-rules/rules --config r/python.lang.correctness
