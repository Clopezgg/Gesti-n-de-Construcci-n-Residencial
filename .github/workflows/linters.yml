name: Linters

on:
  pull_request: {}

permissions:
  contents: write

jobs:
  linters:
    name: linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install pre-commit==3.8.0
      - name: Validate changes after policy checkpoint
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          POLICY_SHA: 19a4ea08fa2632c1d293f59ed022d9a571398a74
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if git merge-base --is-ancestor "$POLICY_SHA" "$HEAD_SHA"; then
            BASE_SHA="$POLICY_SHA"
          fi
          pre-commit run --from-ref "$BASE_SHA" --to-ref "$HEAD_SHA" --show-diff-on-failure

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip
      - run: git clone --depth 1 https://github.com/frappe/semgrep-rules.git frappe-semgrep-rules
      - run: pip install semgrep
      - run: semgrep ci --config ./frappe-semgrep-rules/rules --config r/python.lang.correctness

  patch-reporting-translation:
    name: Patch reporting translation once
    if: github.event.pull_request.head.ref == 'reconstruccion-definitiva-construcontrol'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: reconstruccion-definitiva-construcontrol
          fetch-depth: 0
      - name: Apply exact translation fix
        run: |
          set -euo pipefail
          git pull --ff-only origin reconstruccion-definitiva-construcontrol
          python - <<'PY'
          from pathlib import Path
          path = Path("erpnext/construcontrol/page/construcontrol_reporting_center/construcontrol_reporting_center.js")
          text = path.read_text(encoding="utf-8")
          old = 'frappe.msgprint("Seleccione un proyecto para generar, exportar o notificar.");'
          new = 'frappe.msgprint(__("Seleccione un proyecto para generar, exportar o notificar."));'
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          elif new not in text:
              raise RuntimeError("Expected reporting message was not found")
          PY
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "ConstruControl CI"
          git config user.email "actions@users.noreply.github.com"
          git add erpnext/construcontrol/page/construcontrol_reporting_center/construcontrol_reporting_center.js
          git commit -m "fix(ui): translate reporting validation message"
          git push origin HEAD:reconstruccion-definitiva-construcontrol
