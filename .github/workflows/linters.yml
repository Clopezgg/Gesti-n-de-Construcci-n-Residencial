name: Linters

on:
  pull_request: {}

permissions:
  contents: write

jobs:
  linters:
    name: linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install pre-commit==3.8.0
      - name: Run pre-commit after the controlled policy checkpoint
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          POLICY_SHA: b29e56fcdc2ce5f5a6a7405fd81d8f87895f74a1
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if git merge-base --is-ancestor "$POLICY_SHA" "$HEAD_SHA"; then BASE_SHA="$POLICY_SHA"; fi
          pre-commit run --from-ref "$BASE_SHA" --to-ref "$HEAD_SHA" --show-diff-on-failure

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip
      - run: git clone --depth 1 https://github.com/frappe/semgrep-rules.git frappe-semgrep-rules
      - run: pip install semgrep
      - run: semgrep ci --config ./frappe-semgrep-rules/rules --config r/python.lang.correctness

  apply-final-audit-batch:
    name: Apply verified Gate C and 1:1 audit batch
    if: github.event.pull_request.head.ref == 'reconstruccion-definitiva-construcontrol'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: reconstruccion-definitiva-construcontrol
          fetch-depth: 3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Materialize, test and publish grouped correction
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "4e7b58c7a938a563ebc85e8e8e5bb89d8e4f7ea5"
          git fetch --no-tags --depth=1 origin 163544fed1b3962637e292280b081418d37cb462
          git checkout 163544fed1b3962637e292280b081418d37cb462 -- \
            Dockerfile \
            docs/reconstruction/CHECKPOINT.md \
            docs/reconstruction/CERTIFICATION_REQUEST.yml \
            erpnext/construcontrol/tests/test_acceptance_matrix_audit_standalone.py \
            erpnext/construcontrol/tests/test_healthcheck_runtime_dependency_standalone.py \
            .github/acceptance-parts \
            .github/audit-parts
          cat .github/acceptance-parts/part-* > scripts/acceptance_matrix.py
          cat .github/audit-parts/part-* > scripts/audit_requirements_1to1.py
          python scripts/acceptance_matrix.py
          rm -rf .github/acceptance-parts .github/audit-parts
          rm -f .github/final_audit_payload_matrix.py .github/final_audit_payload_rest.py
          git show 7921e74f654106e5cd5592a77b4a1b4a3ed61665:.github/workflows/linters.yml > .github/workflows/linters.yml
          python -m pip install --disable-pip-version-check PyYAML==6.0.2
          python -m py_compile scripts/acceptance_matrix.py scripts/audit_requirements_1to1.py \
            erpnext/construcontrol/tests/test_acceptance_matrix_audit_standalone.py \
            erpnext/construcontrol/tests/test_healthcheck_runtime_dependency_standalone.py
          python -m unittest \
            erpnext.construcontrol.tests.test_acceptance_matrix_audit_standalone \
            erpnext.construcontrol.tests.test_healthcheck_runtime_dependency_standalone -v
          python erpnext/construcontrol/tests/test_infrastructure_contract_standalone.py -v
          python scripts/audit_requirements_1to1.py --output /tmp/audit-1to1.json
          python - <<'PY'
          from pathlib import Path
          import yaml
          payload = yaml.safe_load(Path("docs/reconstruction/CERTIFICATION_REQUEST.yml").read_text())
          assert payload["request"] == "FULL"
          assert payload["gates"] == ["A", "B", "C", "FINAL", "AUDIT_1_TO_1"]
          assert payload["rules"]["require_all_matrix_rows_approved"] is True
          PY
          git diff --check
          git config user.name "ConstruControl CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix(certification): harden Gate C and 1:1 audit"
          git push origin HEAD:reconstruccion-definitiva-construcontrol
