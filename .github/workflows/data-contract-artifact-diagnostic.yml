name: ConstruControl data contract artifact

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  data-contract-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture data contract validator output
        shell: bash
        run: |
          set +e
          python scripts/validate_construcontrol_data_contract.py > data-contract-validator.log 2>&1
          status=$?
          printf '%s\n' "$status" > data-contract-validator.exit-code
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: construcontrol-data-contract-diagnostic
          path: |
            data-contract-validator.log
            data-contract-validator.exit-code
          if-no-files-found: error
          retention-days: 1
