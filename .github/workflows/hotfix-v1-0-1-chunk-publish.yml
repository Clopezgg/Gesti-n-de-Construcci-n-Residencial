name: Assemble ConstruControl v1.0.1 runtime tests

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: construcontrol-v1-0-1-chunk-publish-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  assemble:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Reconstruct and verify exact Python files
        run: |
          set -euo pipefail
          cat .hotfix/runtime_*.b64 | base64 --decode > erpnext/construcontrol/tests/runtime_smoke.py
          cat .hotfix/test_*.b64 | base64 --decode > erpnext/construcontrol/tests/test_admin_corrections_mariadb.py
          test "$(git hash-object erpnext/construcontrol/tests/runtime_smoke.py)" = "348eaaf57f9e0089cf1911b4385dc4d1d87321d5"
          test "$(git hash-object erpnext/construcontrol/tests/test_admin_corrections_mariadb.py)" = "ae96be999430a046a329198e6adbf181ed0a0bc4"
          python -m py_compile \
            erpnext/construcontrol/tests/runtime_smoke.py \
            erpnext/construcontrol/tests/test_admin_corrections_mariadb.py

      - name: Publish only the verified runtime tests
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            erpnext/construcontrol/tests/runtime_smoke.py \
            erpnext/construcontrol/tests/test_admin_corrections_mariadb.py
          git commit -m 'test(hotfix): exercise corrections in runtime smoke'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
