name: ConstruControl full certification A-B-C-FINAL-1to1

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - docs/reconstruction/CERTIFICATION_REQUEST.yml
      - .github/workflows/construcontrol-full-certification.yml

permissions:
  contents: read

concurrency:
  group: construcontrol-full-certification-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: false

env:
  CERT_SHA: ${{ github.event.pull_request.head.sha }}
  FRAPPE_BRANCH: version-15
  ERPNEXT_VERSION: v15.117.0

jobs:
  semantic:
    name: Semantic · exact immutable history policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CERT_SHA }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate semantic history on the frozen candidate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/semantic
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$CERT_SHA"
          python scripts/validate_commit_titles.py \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "$CERT_SHA" 2>&1 | tee artifacts/semantic/validation.log
          {
            echo "certification_sha=$CERT_SHA"
            echo "base_sha=${{ github.event.pull_request.base.sha }}"
            echo "status=passed"
          } > artifacts/semantic/result.env
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semantic-${{ env.CERT_SHA }}
          path: artifacts/semantic
          if-no-files-found: error
          retention-days: 30

  linters:
    name: Linters · two immutable full-tree passes
    needs: semantic
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CERT_SHA }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install exact pre-commit executor
        run: pip install pre-commit==3.8.0
      - name: Run every configured hook twice without mutation
        shell: bash
        env:
          EVIDENCE_DIR: ${{ runner.temp }}/construcontrol-linters
        run: |
          set -euo pipefail
          mkdir -p "$EVIDENCE_DIR"
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$CERT_SHA"
          pre-commit run --all-files --show-diff-on-failure 2>&1 | tee "$EVIDENCE_DIR/pre-commit-first.log"
          git diff --binary > "$EVIDENCE_DIR/pre-commit-first.patch"
          git status --short > "$EVIDENCE_DIR/git-status-after-first.txt"
          test ! -s "$EVIDENCE_DIR/pre-commit-first.patch"
          test ! -s "$EVIDENCE_DIR/git-status-after-first.txt"
          pre-commit run --all-files --show-diff-on-failure 2>&1 | tee "$EVIDENCE_DIR/pre-commit-second.log"
          git diff --binary > "$EVIDENCE_DIR/pre-commit-second.patch"
          git status --short > "$EVIDENCE_DIR/git-status-after-second.txt"
          test ! -s "$EVIDENCE_DIR/pre-commit-second.patch"
          test ! -s "$EVIDENCE_DIR/git-status-after-second.txt"
          {
            echo "certification_sha=$CERT_SHA"
            echo "first_exit_code=0"
            echo "second_exit_code=0"
            echo "first_tree_clean=true"
            echo "second_tree_clean=true"
          } > "$EVIDENCE_DIR/result.env"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linters-${{ env.CERT_SHA }}
          path: ${{ runner.temp }}/construcontrol-linters
          if-no-files-found: error
          retention-days: 30

  semgrep:
    name: Semgrep · Frappe and Python correctness
    needs: linters
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CERT_SHA }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Run exact Semgrep policy
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/semgrep
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$CERT_SHA"
          git clone --depth 1 https://github.com/frappe/semgrep-rules.git frappe-semgrep-rules
          pip install semgrep
          semgrep ci --config ./frappe-semgrep-rules/rules --config r/python.lang.correctness \
            2>&1 | tee artifacts/semgrep/semgrep.log
          {
            echo "certification_sha=$CERT_SHA"
            echo "exit_code=0"
          } > artifacts/semgrep/result.env
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-${{ env.CERT_SHA }}
          path: artifacts/semgrep
          if-no-files-found: error
          retention-days: 30

  freeze:
    name: Freeze SHA and certify static baseline
    needs: semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      sha: ${{ steps.freeze.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CERT_SHA }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - id: freeze
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$CERT_SHA"
          mkdir -p artifacts/freeze
          python -m pip install --disable-pip-version-check PyYAML==6.0.2
          python - <<'PY'
          import pathlib, yaml
          payload = yaml.safe_load(pathlib.Path("docs/reconstruction/CERTIFICATION_REQUEST.yml").read_text())
          assert payload["request"] == "FULL"
          assert payload["gates"] == ["A", "B", "C", "FINAL", "AUDIT_1_TO_1"]
          PY
          {
            python scripts/validate_repository.py
            python scripts/validate_github_governance.py
            python scripts/validate_construcontrol_integration.py
            python scripts/validate_construcontrol_completion.py
            python scripts/validate_construcontrol_architecture.py
            python scripts/validate_construcontrol_data_contract.py
            python scripts/validate_construcontrol_product.py
            python -m unittest discover -s erpnext/construcontrol/tests -p 'test_*_standalone.py' -v
            python -m compileall -q erpnext/construcontrol scripts
            find erpnext/public/js -maxdepth 1 -type f -name 'construcontrol*.js' -print0 | xargs -0 -r -n1 node --check
            find erpnext/construcontrol/page -type f -name '*.js' -print0 | xargs -0 -r -n1 node --check
            node --check scripts/browser_smoke.mjs
            bash -n deploy/coolify/*.sh
            DB_PASSWORD=x DB_ROOT_PASSWORD=x ADMIN_PASSWORD=x FRAPPE_ENCRYPTION_KEY=x docker compose config >/dev/null
            if git grep -n '^<<<<<<< ' -- .; then
              echo "Unresolved merge marker detected." >&2
              exit 1
            fi
          } 2>&1 | tee artifacts/freeze/static-baseline.log
          echo "sha=$actual" >> "$GITHUB_OUTPUT"
          {
            echo "certification_sha=$actual"
            echo "base_sha=${{ github.event.pull_request.base.sha }}"
            echo "branch=${{ github.event.pull_request.head.ref }}"
            echo "started_at=$(date -u +%FT%TZ)"
            echo "static_baseline=passed"
          } > artifacts/freeze/state.env
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: certification-freeze-${{ env.CERT_SHA }}
          path: artifacts/freeze
          if-no-files-found: error
          retention-days: 30

  gate-a:
    name: Gate A1 → A2 → A3 → A4 · sequential MariaDB contracts
    needs: freeze
    runs-on: ubuntu-latest
    timeout-minutes: 180
    services:
      mysql:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=5s --health-timeout=3s --health-retries=20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.freeze.outputs.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install ERPNext test bench
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/gate-a/shard-{1,2,3,4}
          bash .github/helper/install.sh 2>&1 | tee artifacts/gate-a/install.log
          for shard in 1 2 3 4; do cp artifacts/gate-a/install.log "artifacts/gate-a/shard-$shard/install.log"; done
        env:
          DB: mariadb
          TYPE: server
          FRAPPE_USER: frappe
          FRAPPE_BRANCH: version-15
          PAYMENTS_BRANCH: version-15
      - name: A1 · identity, FI01 and FI02 against MariaDB
        shell: bash
        run: |
          set -euo pipefail
          cd ~/frappe-bench
          bench --site test_site run-tests --module erpnext.construcontrol.tests.test_mariadb_shared_fixtures \
            2>&1 | tee "$GITHUB_WORKSPACE/artifacts/gate-a/shard-1/finance.log"
      - name: A2 · permissions and project denial against MariaDB
        shell: bash
        run: |
          set -euo pipefail
          cd ~/frappe-bench
          bench --site test_site run-tests --module erpnext.construcontrol.tests.test_runtime_user_context \
            2>&1 | tee "$GITHUB_WORKSPACE/artifacts/gate-a/shard-2/permissions.log"
      - name: A3 · three idempotent migrations and runtime migration smoke
        shell: bash
        run: |
          set -euo pipefail
          cd ~/frappe-bench
          {
            for migration in 1 2 3; do bench --site test_site migrate; done
            bench --site test_site execute erpnext.construcontrol.tests.runtime_smoke.run
          } 2>&1 | tee "$GITHUB_WORKSPACE/artifacts/gate-a/shard-3/migrations.log"
      - name: A4 · complete A regression on the migrated site
        shell: bash
        run: |
          set -euo pipefail
          cd ~/frappe-bench
          {
            bench --site test_site run-tests --module erpnext.construcontrol.tests.test_mariadb_shared_fixtures
            bench --site test_site run-tests --module erpnext.construcontrol.tests.test_runtime_user_context
            bench --site test_site execute erpnext.construcontrol.tests.runtime_smoke.run
          } 2>&1 | tee "$GITHUB_WORKSPACE/artifacts/gate-a/shard-4/runtime.log"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gate-a-shard-1-${{ needs.freeze.outputs.sha }}
          path: artifacts/gate-a/shard-1
          if-no-files-found: error
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gate-a-shard-2-${{ needs.freeze.outputs.sha }}
          path: artifacts/gate-a/shard-2
          if-no-files-found: error
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gate-a-shard-3-${{ needs.freeze.outputs.sha }}
          path: artifacts/gate-a/shard-3
          if-no-files-found: error
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gate-a-shard-4-${{ needs.freeze.outputs.sha }}
          path: artifacts/gate-a/shard-4
          if-no-files-found: error
          retention-days: 30

  gate-b:
    name: Gate B · operation, analytics and audit
    needs: gate-a
    runs-on: ubuntu-latest
    timeout-minutes: 110
    services:
      mysql:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=5s --health-timeout=3s --health-retries=20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CERT_SHA }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Directed Gate B contracts
        run: |
          python -m pip install --disable-pip-version-check PyYAML==6.0.2
          for pattern in \
            test_inventory_contract_standalone.py \
            test_quality_closing_contract_standalone.py \
            test_quality_migration_contract_standalone.py \
            test_bi_audit_contract_standalone.py \
            test_audit_contract_standalone.py \
            test_infrastructure_contract_standalone.py; do
            python -m unittest discover -s erpnext/construcontrol/tests -p "$pattern" -v
          done
          find erpnext/public/js -maxdepth 1 -type f -name 'construcontrol*.js' -print0 | xargs -0 -r -n1 node --check
          find erpnext/construcontrol/page -type f -name '*.js' -print0 | xargs -0 -r -n1 node --check
      - name: Install ERPNext test bench
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/gate-b
          bash .github/helper/install.sh 2>&1 | tee artifacts/gate-b/install.log
        env:
          DB: mariadb
          TYPE: server
          FRAPPE_USER: frappe
          FRAPPE_BRANCH: version-15
          PAYMENTS_BRANCH: version-15
      - name: Runtime module behavior
        shell: bash
        run: |
          set -euo pipefail
          cd ~/frappe-bench
          {
            bench --site test_site migrate
            bench --site test_site run-tests --module erpnext.construcontrol.tests.test_mariadb_shared_fixtures
            bench --site test_site run-tests --module erpnext.construcontrol.tests.test_runtime_user_context
            bench --site test_site execute erpnext.construcontrol.tests.runtime_smoke.run
          } 2>&1 | tee "$GITHUB_WORKSPACE/artifacts/gate-b/runtime.log"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gate-b-${{ env.CERT_SHA }}
          path: artifacts/gate-b
          if-no-files-found: error
          retention-days: 30

  gate-c:
    name: Gate C · PWA, infrastructure, persistence, backup and restore
    needs: gate-b
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CERT_SHA }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate Gate C contracts
        run: |
          python -m pip install --disable-pip-version-check PyYAML==6.0.2
          python erpnext/construcontrol/tests/test_pwa_interface_contract_standalone.py -v
          python erpnext/construcontrol/tests/test_infrastructure_contract_standalone.py -v
          python erpnext/construcontrol/tests/test_browser_smoke_contract_standalone.py -v
          python -m py_compile scripts/verify_backup_manifest.py scripts/audit_requirements_1to1.py
          node --check scripts/browser_smoke.mjs
          bash -n deploy/coolify/*.sh
          BROWSER_PORT=8080 DB_PASSWORD=x DB_ROOT_PASSWORD=x ADMIN_PASSWORD=x FRAPPE_ENCRYPTION_KEY=x \
            docker compose -f docker-compose.yml -f deploy/ci/docker-compose.browser.yml config >/dev/null
      - name: Create isolated runtime environment
        shell: bash
        run: |
          echo "127.0.0.1 construcontrol-ci.test" | sudo tee -a /etc/hosts
          getent hosts construcontrol-ci.test
          cat > .ci.env <<EOF
          SITE_NAME=construcontrol-ci
          DB_NAME=_construcontrol_ci
          DB_PASSWORD=$(openssl rand -hex 18)
          DB_ROOT_PASSWORD=$(openssl rand -hex 18)
          ADMIN_PASSWORD=$(openssl rand -hex 18)
          FRAPPE_ENCRYPTION_KEY=$(openssl rand -base64 32 | tr -d '\n')
          ERPNEXT_VERSION=${ERPNEXT_VERSION}
          FRAPPE_EXTERNAL_URL=http://construcontrol-ci.test:8080
          TZ=America/Tegucigalpa
          BACKUP_LOCAL_HOUR=2
          BACKUP_RETENTION_DAYS=14
          BACKUP_RUN_ON_START=false
          SUPABASE_STORAGE_MODE=disabled
          BROWSER_PORT=8080
          EOF
      - name: Build and certify complete stack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/gate-c/browser
          compose=(docker compose --env-file .ci.env -f docker-compose.yml -f deploy/ci/docker-compose.browser.yml)
          "${compose[@]}" up -d --build
          services=(mariadb redis-cache redis-queue backend websocket queue-short queue-long scheduler frontend backup)
          for service in "${services[@]}"; do
            healthy=0
            for attempt in $(seq 1 120); do
              container="$("${compose[@]}" ps -q "$service")"
              state="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null || true)"
              echo "$service attempt=$attempt state=$state" | tee -a artifacts/gate-c/health.log
              if [[ "$state" == "healthy" ]]; then healthy=1; break; fi
              if [[ "$state" == "unhealthy" || "$state" == "exited" || "$state" == "dead" ]]; then break; fi
              sleep 5
            done
            test "$healthy" = "1"
          done
          site=construcontrol-ci
          "${compose[@]}" exec -T backend bench --site "$site" execute erpnext.construcontrol.tests.runtime_smoke.run > artifacts/gate-c/runtime-smoke.json
          set -a
          source .ci.env
          set +a
          npm install --no-save playwright@1.52.0 2>&1 | tee artifacts/gate-c/playwright-install.log
          npx playwright install --with-deps chromium 2>&1 | tee artifacts/gate-c/playwright-browser-install.log
          CONSTRUCONTROL_BASE_URL=http://construcontrol-ci.test:8080 \
            BROWSER_ARTIFACT_DIR=artifacts/gate-c/browser \
            node scripts/browser_smoke.mjs 2>&1 | tee artifacts/gate-c/browser.log
          "${compose[@]}" exec -T backend bench --site "$site" execute erpnext.construcontrol.tests.runtime_smoke.create_persistence_marker --kwargs '{"marker":"GATE-C-PERSISTENCE"}'
          "${compose[@]}" restart backend websocket queue-short queue-long scheduler frontend
          for service in backend websocket queue-short queue-long scheduler frontend; do
            healthy=0
            for attempt in $(seq 1 90); do
              container="$("${compose[@]}" ps -q "$service")"
              state="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null || true)"
              echo "restart $service attempt=$attempt state=$state" | tee -a artifacts/gate-c/restart-health.log
              if [[ "$state" == "healthy" ]]; then healthy=1; break; fi
              if [[ "$state" == "unhealthy" || "$state" == "exited" || "$state" == "dead" ]]; then break; fi
              sleep 5
            done
            test "$healthy" = "1"
          done
          "${compose[@]}" exec -T backend bench --site "$site" execute erpnext.construcontrol.tests.runtime_smoke.verify_and_cleanup_persistence_marker --kwargs '{"marker":"GATE-C-PERSISTENCE"}'
          "${compose[@]}" exec -T backend bash apps/erpnext/deploy/coolify/backup-now.sh | tee artifacts/gate-c/backup.log
          manifest="$("${compose[@]}" exec -T backend cat "sites/$site/private/backup-archive/latest-manifest-path" | tr -d '\r')"
          "${compose[@]}" exec -T backend python3 apps/erpnext/scripts/verify_backup_manifest.py --manifest "$manifest" > artifacts/gate-c/backup-verification.json
          "${compose[@]}" exec -T backend bash apps/erpnext/deploy/coolify/restore-verify.sh "$manifest" construcontrol-restore-ci | tee artifacts/gate-c/restore.log
      - name: Capture Gate C logs
        if: always()
        run: |
          docker compose --env-file .ci.env -f docker-compose.yml -f deploy/ci/docker-compose.browser.yml ps -a > artifacts/gate-c/compose-ps.txt 2>&1 || true
          docker compose --env-file .ci.env -f docker-compose.yml -f deploy/ci/docker-compose.browser.yml logs --no-color --tail=800 > artifacts/gate-c/compose.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gate-c-${{ env.CERT_SHA }}
          path: artifacts/gate-c
          if-no-files-found: error
          retention-days: 30
      - name: Remove Gate C stack
        if: always()
        run: |
          docker compose --env-file .ci.env -f docker-compose.yml -f deploy/ci/docker-compose.browser.yml down --remove-orphans -v || true
          rm -f .ci.env

  final:
    name: FINAL · clean install, update, three migrations and global behavior
    needs: gate-c
    runs-on: ubuntu-latest
    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CERT_SHA }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Reconfirm global static baseline
        run: |
          python -m pip install --disable-pip-version-check PyYAML==6.0.2
          python scripts/validate_repository.py
          python scripts/validate_github_governance.py
          python scripts/validate_construcontrol_integration.py
          python scripts/validate_construcontrol_completion.py
          python scripts/validate_construcontrol_architecture.py
          python scripts/validate_construcontrol_data_contract.py
          python scripts/validate_construcontrol_product.py
          python -m unittest discover -s erpnext/construcontrol/tests -p 'test_*_standalone.py' -v
          python -m compileall -q erpnext/construcontrol scripts
          find erpnext/public/js -maxdepth 1 -type f -name 'construcontrol*.js' -print0 | xargs -0 -r -n1 node --check
          find erpnext/construcontrol/page -type f -name '*.js' -print0 | xargs -0 -r -n1 node --check
          node --check scripts/browser_smoke.mjs
          bash -n deploy/coolify/*.sh
          BROWSER_PORT=8080 DB_PASSWORD=x DB_ROOT_PASSWORD=x ADMIN_PASSWORD=x FRAPPE_ENCRYPTION_KEY=x \
            docker compose -f docker-compose.yml -f deploy/ci/docker-compose.browser.yml config >/dev/null
      - name: Create final isolated environment
        shell: bash
        run: |
          echo "127.0.0.1 construcontrol-ci.test" | sudo tee -a /etc/hosts
          getent hosts construcontrol-ci.test
          cat > .final.env <<EOF
          SITE_NAME=construcontrol-final
          DB_NAME=_construcontrol_final
          DB_PASSWORD=$(openssl rand -hex 18)
          DB_ROOT_PASSWORD=$(openssl rand -hex 18)
          ADMIN_PASSWORD=$(openssl rand -hex 18)
          FRAPPE_ENCRYPTION_KEY=$(openssl rand -base64 32 | tr -d '\n')
          ERPNEXT_VERSION=${ERPNEXT_VERSION}
          FRAPPE_EXTERNAL_URL=http://construcontrol-ci.test:8080
          TZ=America/Tegucigalpa
          BACKUP_LOCAL_HOUR=2
          BACKUP_RETENTION_DAYS=14
          BACKUP_RUN_ON_START=false
          SUPABASE_STORAGE_MODE=disabled
          BROWSER_PORT=8080
          EOF
      - name: Clean install, update and restore proof
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/final/browser
          compose=(docker compose --env-file .final.env -f docker-compose.yml -f deploy/ci/docker-compose.browser.yml)
          "${compose[@]}" up -d --build
          backend="$("${compose[@]}" ps -q backend)"
          healthy=0
          for attempt in $(seq 1 120); do
            state="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$backend" 2>/dev/null || true)"
            echo "clean-install attempt=$attempt state=$state" | tee -a artifacts/final/health.log
            if [[ "$state" == "healthy" ]]; then healthy=1; break; fi
            if [[ "$state" == "unhealthy" || "$state" == "exited" || "$state" == "dead" ]]; then break; fi
            sleep 5
          done
          test "$healthy" = "1"
          for migration in 1 2 3; do
            "${compose[@]}" exec -T backend bench --site construcontrol-final migrate 2>&1 | tee -a artifacts/final/migrations.log
          done
          "${compose[@]}" exec -T backend bench --site construcontrol-final execute erpnext.construcontrol.tests.runtime_smoke.run > artifacts/final/runtime-smoke.json
          "${compose[@]}" exec -T backend bench --site construcontrol-final execute erpnext.construcontrol.tests.runtime_smoke.create_persistence_marker --kwargs '{"marker":"FINAL-REDEPLOY-PERSISTENCE"}'
          "${compose[@]}" up -d --build --force-recreate backend websocket queue-short queue-long scheduler frontend backup
          for service in backend websocket queue-short queue-long scheduler frontend backup; do
            healthy=0
            for attempt in $(seq 1 120); do
              container="$("${compose[@]}" ps -q "$service")"
              state="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null || true)"
              echo "redeploy $service attempt=$attempt state=$state" | tee -a artifacts/final/redeploy-health.log
              if [[ "$state" == "healthy" ]]; then healthy=1; break; fi
              if [[ "$state" == "unhealthy" || "$state" == "exited" || "$state" == "dead" ]]; then break; fi
              sleep 5
            done
            test "$healthy" = "1"
          done
          "${compose[@]}" exec -T backend bench --site construcontrol-final execute erpnext.construcontrol.tests.runtime_smoke.verify_and_cleanup_persistence_marker --kwargs '{"marker":"FINAL-REDEPLOY-PERSISTENCE"}'
          set -a
          source .final.env
          set +a
          npm install --no-save playwright@1.52.0 2>&1 | tee artifacts/final/playwright-install.log
          npx playwright install --with-deps chromium 2>&1 | tee artifacts/final/playwright-browser-install.log
          CONSTRUCONTROL_BASE_URL=http://construcontrol-ci.test:8080 \
            BROWSER_ARTIFACT_DIR=artifacts/final/browser \
            node scripts/browser_smoke.mjs 2>&1 | tee artifacts/final/browser.log
          "${compose[@]}" exec -T backend bash apps/erpnext/deploy/coolify/backup-now.sh | tee artifacts/final/backup.log
          manifest="$("${compose[@]}" exec -T backend cat "sites/construcontrol-final/private/backup-archive/latest-manifest-path" | tr -d '\r')"
          "${compose[@]}" exec -T backend python3 apps/erpnext/scripts/verify_backup_manifest.py --manifest "$manifest" > artifacts/final/backup-verification.json
          "${compose[@]}" exec -T backend bash apps/erpnext/deploy/coolify/restore-verify.sh "$manifest" construcontrol-final-restore | tee artifacts/final/restore.log
      - name: Capture FINAL evidence
        if: always()
        run: |
          docker compose --env-file .final.env -f docker-compose.yml -f deploy/ci/docker-compose.browser.yml ps -a > artifacts/final/compose-ps.txt 2>&1 || true
          docker compose --env-file .final.env -f docker-compose.yml -f deploy/ci/docker-compose.browser.yml logs --no-color --tail=1000 > artifacts/final/compose.log 2>&1 || true
          git rev-parse HEAD > artifacts/final/head.sha
          git diff --check > artifacts/final/git-diff-check.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-${{ env.CERT_SHA }}
          path: artifacts/final
          if-no-files-found: error
          retention-days: 30
      - name: Remove FINAL stack
        if: always()
        run: |
          docker compose --env-file .final.env -f docker-compose.yml -f deploy/ci/docker-compose.browser.yml down --remove-orphans -v || true
          rm -f .final.env

  audit-1-to-1:
    name: Independent audit 1:1
    needs: final
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CERT_SHA }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download every upstream artifact for the exact CERT_SHA
        uses: actions/download-artifact@v4
        with:
          pattern: "*-${{ env.CERT_SHA }}"
          path: artifacts/upstream
      - name: Execute independent requirement audit
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/audit-1to1
          python -m pip install --disable-pip-version-check PyYAML==6.0.2
          expected=(semantic linters semgrep certification-freeze gate-a-shard-1 gate-a-shard-2 gate-a-shard-3 gate-a-shard-4 gate-b gate-c final)
          for prefix in "${expected[@]}"; do
            test -d "artifacts/upstream/${prefix}-${CERT_SHA}"
          done
          CERT_SHA="$CERT_SHA" python - <<'PY'
          import json
          import os
          from pathlib import Path
          from scripts.acceptance_receipts import artifact_digest

          cert_sha = os.environ["CERT_SHA"]
          upstream = Path("artifacts/upstream")
          rows = []
          for artifact in sorted(path for path in upstream.iterdir() if path.is_dir()):
              digest, manifest = artifact_digest(artifact)
              rows.append({"name": artifact.name, "sha256": digest, "file_count": len(manifest)})
          target = upstream / f"audit-input-{cert_sha}"
          target.mkdir()
          (target / "upstream-artifacts.json").write_text(
              json.dumps({"cert_sha": cert_sha, "artifacts": rows}, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          python scripts/certify_acceptance_receipts.py \
            --cert-sha "$CERT_SHA" \
            --artifacts-root artifacts/upstream \
            --receipts-dir artifacts/audit-1to1/receipts \
            --certified-matrix artifacts/audit-1to1/MATRIZ_ACEPTACION_1A1_CERTIFICADA.md \
            > artifacts/audit-1to1/certification.json
          python scripts/audit_requirements_1to1.py \
            --matrix artifacts/audit-1to1/MATRIZ_ACEPTACION_1A1_CERTIFICADA.md \
            --receipts artifacts/audit-1to1/receipts \
            --artifacts-root artifacts/upstream \
            --cert-sha "$CERT_SHA" \
            --output artifacts/audit-1to1/report.json
          python -m unittest discover -s erpnext/construcontrol/tests -p 'test_*_standalone.py' -v 2>&1 | tee artifacts/audit-1to1/standalone-tests.log
          git diff --check
          git status --short --branch > artifacts/audit-1to1/git-status.txt
          git diff --name-status "${{ github.event.pull_request.base.sha }}...${CERT_SHA}" > artifacts/audit-1to1/pr-files.txt
          git log --oneline --decorate -n 200 > artifacts/audit-1to1/history.txt
          git archive --format=tar.gz --output=artifacts/audit-1to1/source.tar.gz "$CERT_SHA"
          {
            echo "audit_status=passed"
            echo "certification_sha=$CERT_SHA"
            echo "completed_at=$(date -u +%FT%TZ)"
          } > artifacts/audit-1to1/result.env
      - uses: actions/upload-artifact@v4
        with:
          name: independent-audit-1to1-${{ env.CERT_SHA }}
          path: artifacts/audit-1to1
          if-no-files-found: error
          retention-days: 30
