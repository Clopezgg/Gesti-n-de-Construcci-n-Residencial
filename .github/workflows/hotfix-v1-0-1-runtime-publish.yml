name: Publish ConstruControl v1.0.1 runtime correction smoke

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: construcontrol-v1-0-1-runtime-publish-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Reuse the reviewed integration script
        run: |
          set -euo pipefail
          pip install PyYAML==6.0.2 ruff==0.2.0
          python - <<'PY'
          import subprocess
          from pathlib import Path
          import yaml

          workflow = yaml.safe_load(
              Path('.github/workflows/hotfix-v1-0-1-test-wiring.yml').read_text(encoding='utf-8')
          )
          steps = workflow['jobs']['integrate']['steps']
          script = next(
              step['run']
              for step in steps
              if step.get('name') == 'Integrate Administrator correction smoke into the existing runtime probe'
          )
          subprocess.run(['bash', '-lc', script], check=True)
          PY
          ruff check --select I --fix erpnext/construcontrol/tests/runtime_smoke.py erpnext/construcontrol/tests/test_admin_corrections_mariadb.py || true
          ruff format erpnext/construcontrol/tests/runtime_smoke.py erpnext/construcontrol/tests/test_admin_corrections_mariadb.py
          python -m py_compile erpnext/construcontrol/tests/runtime_smoke.py erpnext/construcontrol/tests/test_admin_corrections_mariadb.py

      - name: Publish only the integrated Python files
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add erpnext/construcontrol/tests/runtime_smoke.py erpnext/construcontrol/tests/test_admin_corrections_mariadb.py
          git commit -m 'test(hotfix): exercise corrections in runtime smoke'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
