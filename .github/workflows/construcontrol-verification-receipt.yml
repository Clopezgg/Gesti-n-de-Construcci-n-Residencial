name: ConstruControl verification evidence

on:
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - docker-compose.yml
      - deploy/**
      - erpnext/construcontrol/**
      - erpnext/public/**
      - scripts/**
      - .github/workflows/construcontrol-verification-receipt.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: construcontrol-verification-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 110
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Execute static product verification
        id: static
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/verification
          (
            set -euo pipefail
            echo "source_sha=$(git rev-parse HEAD)"
            echo "started_at=$(date -u +%FT%TZ)"
            python -m pip install --disable-pip-version-check PyYAML==6.0.2
            python scripts/validate_repository.py
            python scripts/validate_construcontrol_integration.py
            python scripts/validate_construcontrol_completion.py
            python scripts/validate_construcontrol_architecture.py
            python scripts/validate_construcontrol_data_contract.py
            python scripts/validate_construcontrol_product.py
            python -m unittest discover -s erpnext/construcontrol/tests -p 'test_*_standalone.py' -v
            python -m compileall -q erpnext/construcontrol scripts
            find erpnext/public/js -maxdepth 1 -type f -name 'construcontrol*.js' -print0 | xargs -0 -r -n1 node --check
            find erpnext/construcontrol/page -type f -name '*.js' -print0 | xargs -0 -r -n1 node --check
          ) > artifacts/verification/static.log 2>&1
          status=$?
          printf '%s\n' "$status" > artifacts/verification/static.exit-code
          printf 'completed_at=%s\n' "$(date -u +%FT%TZ)" >> artifacts/verification/static.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Execute isolated runtime verification
        id: runtime
        if: steps.static.outputs.status == '0'
        shell: bash
        run: |
          set +e
          log=artifacts/verification/runtime.log
          code=artifacts/verification/runtime.exit-code
          : > "$log"
          echo "source_sha=$(git rev-parse HEAD)" >> "$log"
          echo "started_at=$(date -u +%FT%TZ)" >> "$log"
          cat > .ci.env <<EOF
          SITE_NAME=construcontrol-ci
          DB_NAME=_construcontrol_ci
          DB_PASSWORD=$(openssl rand -hex 18)
          DB_ROOT_PASSWORD=$(openssl rand -hex 18)
          ADMIN_PASSWORD=$(openssl rand -hex 18)
          FRAPPE_ENCRYPTION_KEY=$(openssl rand -base64 32)
          ERPNEXT_VERSION=v15.117.0
          TZ=America/Tegucigalpa
          SUPABASE_STORAGE_MODE=disabled
          EOF
          status=0
          compose=(docker compose --env-file .ci.env)
          "${compose[@]}" up -d --build backend >> "$log" 2>&1 || status=$?
          if [[ "$status" == "0" ]]; then
            container="$("${compose[@]}" ps -q backend)"
            healthy=0
            for attempt in $(seq 1 90); do
              state="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null)"
              echo "backend_health_attempt_${attempt}=$state" >> "$log"
              if [[ "$state" == "healthy" ]]; then healthy=1; break; fi
              if [[ "$state" == "unhealthy" || "$state" == "exited" || "$state" == "dead" ]]; then break; fi
              sleep 10
            done
            [[ "$healthy" == "1" ]] || status=1
          fi
          if [[ "$status" == "0" ]]; then
            site="construcontrol-ci"
            "${compose[@]}" exec -T backend bench --site "$site" migrate >> "$log" 2>&1 || status=$?
            [[ "$status" == "0" ]] && "${compose[@]}" exec -T backend bench --site "$site" migrate >> "$log" 2>&1 || status=$?
            [[ "$status" == "0" ]] && "${compose[@]}" exec -T backend bench --site "$site" execute erpnext.construcontrol.tests.runtime_smoke.run >> "$log" 2>&1 || status=$?
            [[ "$status" == "0" ]] && "${compose[@]}" exec -T backend bench --site "$site" execute erpnext.construcontrol.tests.runtime_smoke.create_persistence_marker --kwargs '{"marker":"CONSTRUCONTROL-CI-PERSISTENCE"}' >> "$log" 2>&1 || status=$?
          fi
          if [[ "$status" == "0" ]]; then
            "${compose[@]}" restart backend >> "$log" 2>&1 || status=$?
            container="$("${compose[@]}" ps -q backend)"
            healthy=0
            for attempt in $(seq 1 60); do
              state="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null)"
              echo "restart_health_attempt_${attempt}=$state" >> "$log"
              if [[ "$state" == "healthy" ]]; then healthy=1; break; fi
              if [[ "$state" == "unhealthy" || "$state" == "exited" || "$state" == "dead" ]]; then break; fi
              sleep 10
            done
            [[ "$healthy" == "1" ]] || status=1
          fi
          if [[ "$status" == "0" ]]; then
            site="construcontrol-ci"
            "${compose[@]}" exec -T backend bench --site "$site" execute erpnext.construcontrol.tests.runtime_smoke.verify_and_cleanup_persistence_marker --kwargs '{"marker":"CONSTRUCONTROL-CI-PERSISTENCE"}' >> "$log" 2>&1 || status=$?
            [[ "$status" == "0" ]] && "${compose[@]}" exec -T backend bench --site "$site" backup --with-files >> "$log" 2>&1 || status=$?
            [[ "$status" == "0" ]] && "${compose[@]}" exec -T backend bash -lc 'test -n "$(find sites/construcontrol-ci/private/backups -maxdepth 1 -type f -name "*.sql.gz" -print -quit)"' >> "$log" 2>&1 || status=$?
          fi
          if [[ "$status" != "0" ]]; then
            "${compose[@]}" logs --no-color --tail=300 >> "$log" 2>&1
          fi
          "${compose[@]}" down --remove-orphans >> "$log" 2>&1
          rm -f .ci.env
          echo "completed_at=$(date -u +%FT%TZ)" >> "$log"
          echo "status=$status" >> "$log"
          printf '%s\n' "$status" > "$code"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record skipped runtime validation
        if: steps.static.outputs.status != '0'
        shell: bash
        run: |
          printf '1\n' > artifacts/verification/runtime.exit-code
          printf 'source_sha=%s\nstatus=skipped_static_failure\n' "$(git rev-parse HEAD)" > artifacts/verification/runtime.log

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: construcontrol-verification-${{ github.sha }}
          path: artifacts/verification/
          if-no-files-found: error
          retention-days: 14

      - name: Preserve verification result
        shell: bash
        run: |
          static_status="${{ steps.static.outputs.status }}"
          runtime_status="${{ steps.runtime.outputs.status }}"
          [[ "$static_status" == "0" && "$runtime_status" == "0" ]]
