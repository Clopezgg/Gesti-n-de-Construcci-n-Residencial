name: ConstruControl static verification evidence

on:
  pull_request:
    branches: [main]
    paths:
      - erpnext/construcontrol/**
      - erpnext/public/**
      - scripts/**
      - .github/helper/**
      - .github/workflows/construcontrol-verification-receipt.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: construcontrol-static-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Execute static product verification
        id: verify
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/static-verification
          (
            set -euo pipefail
            echo "source_sha=$(git rev-parse HEAD)"
            echo "started_at=$(date -u +%FT%TZ)"
            python -m pip install --disable-pip-version-check PyYAML==6.0.2
            python scripts/validate_repository.py
            python scripts/validate_github_governance.py
            python scripts/validate_construcontrol_integration.py
            python scripts/validate_construcontrol_completion.py
            python scripts/validate_construcontrol_architecture.py
            python scripts/validate_construcontrol_data_contract.py
            python scripts/validate_construcontrol_product.py
            python -m unittest discover -s erpnext/construcontrol/tests -p 'test_*_standalone.py' -v
            python -m compileall -q erpnext/construcontrol scripts
            find erpnext/public/js -maxdepth 1 -type f -name 'construcontrol*.js' -print0 | xargs -0 -r -n1 node --check
            find erpnext/construcontrol/page -type f -name '*.js' -print0 | xargs -0 -r -n1 node --check
            echo "completed_at=$(date -u +%FT%TZ)"
          ) > artifacts/static-verification/verification.log 2>&1
          status=$?
          printf '%s\n' "$status" > artifacts/static-verification/exit-code
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload static verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: construcontrol-static-${{ github.sha }}
          path: artifacts/static-verification/
          if-no-files-found: error
          retention-days: 14

      - name: Preserve static verification result
        shell: bash
        run: exit "${{ steps.verify.outputs.status }}"
