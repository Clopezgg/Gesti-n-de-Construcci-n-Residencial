name: ConstruControl static verification receipt

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: construcontrol-static-verification-receipt
  cancel-in-progress: true

jobs:
  verify-and-record:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Execute static product verification
        id: verify
        shell: bash
        run: |
          set +e
          mkdir -p docs/validation
          (
            set -euo pipefail
            echo "source_sha=$(git rev-parse HEAD)"
            echo "started_at=$(date -u +%FT%TZ)"
            python -m pip install --disable-pip-version-check PyYAML==6.0.2
            python scripts/validate_repository.py
            python scripts/validate_construcontrol_integration.py
            python scripts/validate_construcontrol_completion.py
            python scripts/validate_construcontrol_architecture.py
            python scripts/validate_construcontrol_data_contract.py
            python scripts/validate_construcontrol_product.py
            python -m unittest discover -s erpnext/construcontrol/tests -p 'test_*_standalone.py' -v
            python -m compileall -q erpnext/construcontrol scripts
            find erpnext/public/js -maxdepth 1 -type f -name 'construcontrol*.js' -print0 | xargs -0 -r -n1 node --check
            find erpnext/construcontrol/page -type f -name '*.js' -print0 | xargs -0 -r -n1 node --check
          ) > docs/validation/latest-static.log 2>&1
          status=$?
          printf '%s\n' "$status" > docs/validation/latest-static.exit-code
          printf 'completed_at=%s\n' "$(date -u +%FT%TZ)" >> docs/validation/latest-static.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit immutable static verification receipt
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ConstruControl Static Verification"
          git config user.email "actions@users.noreply.github.com"
          git add docs/validation/latest-static.log docs/validation/latest-static.exit-code
          if ! git diff --cached --quiet; then
            git commit -m "Record ConstruControl static verification receipt [skip ci]"
            git push origin HEAD:main
          fi

      - name: Preserve verification result
        shell: bash
        run: exit "${{ steps.verify.outputs.status }}"
