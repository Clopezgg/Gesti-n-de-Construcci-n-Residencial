name: ConstruControl branch audit

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/construcontrol-branch-cleanup.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch branches and create non-destructive audit
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune
          mkdir -p artifacts/branch-audit
          {
            echo '# Auditoría no destructiva de ramas de ConstruControl'
            echo
            echo "Fecha UTC: $(date -u +%FT%TZ)"
            echo "Ref auditado: $(git rev-parse HEAD)"
            echo "Main remoto: $(git rev-parse origin/main)"
            echo
            echo '| Rama | SHA | Adelante de main | Detrás de main | Archivos distintos |'
            echo '|---|---|---:|---:|---:|'
            while IFS= read -r ref; do
              branch="${ref#refs/remotes/origin/}"
              [[ "$branch" == "HEAD" ]] && continue
              sha=$(git rev-parse "$ref")
              ahead=$(git rev-list --count origin/main.."$ref")
              behind=$(git rev-list --count "$ref"..origin/main)
              files=$(git diff --name-only origin/main..."$ref" | wc -l | tr -d ' ')
              echo "| $branch | $sha | $ahead | $behind | $files |"
            done < <(git for-each-ref --format='%(refname)' refs/remotes/origin | sort)
          } > artifacts/branch-audit/branches.md

      - name: Upload branch audit
        uses: actions/upload-artifact@v4
        with:
          name: construcontrol-branch-audit-${{ github.sha }}
          path: artifacts/branch-audit/branches.md
          if-no-files-found: error
          retention-days: 14
