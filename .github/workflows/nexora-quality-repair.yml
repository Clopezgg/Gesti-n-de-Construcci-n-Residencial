name: NEXORA quality repair

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/nexora-quality-repair.yml

permissions:
  contents: write
  actions: read

concurrency:
  group: nexora-quality-repair-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nexora-reconstruccion
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Verify authorized head and retrieve exact formatter evidence
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "c3759cdf5b14b3194239fe66876975d1dda2a25c"
          mkdir -p "$RUNNER_TEMP/nexora-quality"
          gh api repos/${{ github.repository }}/actions/artifacts/8554412118/zip > "$RUNNER_TEMP/nexora-quality/evidence.zip"
          unzip -q "$RUNNER_TEMP/nexora-quality/evidence.zip" -d "$RUNNER_TEMP/nexora-quality/evidence"
          mkdir -p "$RUNNER_TEMP/nexora-quality/formatted"
          tar -xzf "$RUNNER_TEMP/nexora-quality/evidence/formatted-worktree.tar.gz" \
            -C "$RUNNER_TEMP/nexora-quality/formatted"

      - name: Materialize formatter output and Semgrep correction
        shell: bash
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/nexora-quality/formatted"
          files=(
            nexora_app/nexora/financial/catalog.py
            nexora_app/nexora/financial/core.py
            nexora_app/nexora/financial/db.py
            nexora_app/nexora/financial/reference_rules.py
            nexora_app/nexora/nexora/page/nexora_finance/nexora_finance.js
            nexora_app/nexora/tests/test_financial_model_contract.py
            nexora_app/nexora/tests/test_financial_service_contract.py
            nexora_app/nexora/tests/test_financial_ui_contract.py
            nexora_app/nexora/tests/test_ledger_contract.py
            nexora_app/nexora/tests/test_ledger_integration.py
            scripts/generate_file_inventory.py
          )
          for file in "${files[@]}"; do
            test -f "$root/$file"
            cp "$root/$file" "$file"
          done
          python - <<'PY'
          from pathlib import Path

          path = Path("nexora_app/nexora/financial/analytics.py")
          text = path.read_text(encoding="utf-8")
          old = '\t\tallowed_categories=tuple(filter(None, str(doc.allowed_categories or "").splitlines())),\n'
          new = (
              '\t\tallowed_categories=tuple(\n'
              '\t\t\tcategory\n'
              '\t\t\tfor category in str(doc.allowed_categories or "").splitlines()\n'
              '\t\t\tif category\n'
              '\t\t),\n'
          )
          if old not in text:
              raise SystemExit("Expected Semgrep target was not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Prove formatting Semgrep contracts and repository validity
        shell: bash
        run: |
          set -euo pipefail
          pip install pre-commit==3.8.0 semgrep
          pre-commit run --all-files --show-diff-on-failure || true
          pre-commit run --all-files --show-diff-on-failure
          git diff --check
          git clone --depth 1 https://github.com/frappe/semgrep-rules.git "$RUNNER_TEMP/frappe-semgrep-rules"
          semgrep ci --config "$RUNNER_TEMP/frappe-semgrep-rules/rules" --config r/python.lang.correctness
          python scripts/generate_file_inventory.py
          python scripts/validate_nexora_governance.py --expected-main-head 73c9dadfb81f543e53f45887448fdecbee081850
          python scripts/validate_nexora_app.py
          python scripts/validate_nexora_financial_models.py
          python -m unittest discover -s nexora_app/nexora/tests -p 'test_*contract.py' -v
          PYTHONPATH=nexora_app python -m unittest nexora.tests.test_financial_core nexora.tests.test_ledger_core nexora.tests.test_reference_rules -v
          node --check nexora_app/nexora/nexora/page/nexora_finance/nexora_finance.js
          python -m compileall -q nexora_app/nexora scripts
          python scripts/validate_repository.py

      - name: Publish coherent quality correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "NEXORA CI Publisher"
          git config user.email "noreply@github.com"
          git add nexora_app scripts/generate_file_inventory.py docs/architecture/file_inventory.json
          git commit -m "style(nexora): satisfy frappe quality gates"
          git push origin HEAD:nexora-reconstruccion
