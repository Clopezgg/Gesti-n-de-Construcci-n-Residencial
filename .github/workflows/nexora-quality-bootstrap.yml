name: NEXORA quality bootstrap

on:
  push:
    branches: [nexora-reconstruccion]
    paths:
      - .github/workflows/nexora-quality-bootstrap.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nexora-reconstruccion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Download exact pre-commit formatted tree
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api /repos/${{ github.repository }}/actions/artifacts/8549593436/zip > /tmp/nexora-linters.zip
          mkdir -p /tmp/nexora-linters
          unzip -q /tmp/nexora-linters.zip -d /tmp/nexora-linters
          tar -xzf /tmp/nexora-linters/formatted-worktree.tar.gz -C "$GITHUB_WORKSPACE"
      - name: Apply reviewed Semgrep corrections
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          root = Path.cwd()

          def replace(path: str, old: str, new: str) -> None:
              target = root / path
              text = target.read_text(encoding="utf-8")
              if old not in text:
                  raise RuntimeError(f"Expected pattern missing in {path}: {old[:80]!r}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          replace("nexora_app/nexora/financial/context.py", "import frappe\n", "import frappe\nfrom frappe import _\n")
          replace("nexora_app/nexora/financial/context.py", 'frappe.throw("Este documento solo puede escribirse mediante un servicio transaccional NEXORA.")', 'frappe.throw(_("Este documento solo puede escribirse mediante un servicio transaccional NEXORA."))')

          replace("nexora_app/nexora/financial/model_utils.py", "import frappe\n", "import frappe\nfrom frappe import _\n")
          for old, new in (
              ('frappe.throw(f"Importe inválido: {value!r}")', 'frappe.throw(_("Importe inválido: {0}").format(repr(value)))'),
              ('frappe.throw(f"Tasa inválida: {value!r}")', 'frappe.throw(_("Tasa inválida: {0}").format(repr(value)))'),
              ('frappe.throw(f"Documento inmutable; campos alterados: {\', \'.join(changed)}")', 'frappe.throw(_("Documento inmutable; campos alterados: {0}").format(", ".join(changed)))'),
              ('frappe.throw("El número documental debe contener exactamente 12 dígitos.")', 'frappe.throw(_("El número documental debe contener exactamente 12 dígitos."))'),
          ):
              replace("nexora_app/nexora/financial/model_utils.py", old, new)

          replace(
              "nexora_app/nexora/financial/db.py",
              '\tplaceholders = ", ".join(["%s"] * len(ordered))\n\trows = frappe.db.sql(\n\t\tf"SELECT name FROM `tabNXR Fund Source` WHERE name IN ({placeholders}) ORDER BY name FOR UPDATE",\n\t\tordered,\n\t)\n',
              '\tsource = frappe.qb.DocType("NXR Fund Source")\n\trows = (\n\t\tfrappe.qb.from_(source)\n\t\t.select(source.name)\n\t\t.where(source.name.isin(ordered))\n\t\t.orderby(source.name)\n\t\t.for_update()\n\t).run()\n',
          )

          install = root / "nexora_app/nexora/install.py"
          install.write_text(install.read_text(encoding="utf-8").replace("\tfrappe.db.commit()\n", ""), encoding="utf-8")

          translated = {
              "nexora_app/nexora/nexora/doctype/nxr_commitment/nxr_commitment.py": (
                  ('frappe.throw("El compromiso debe ser mayor que cero.")', 'frappe.throw(_("El compromiso debe ser mayor que cero."))'),
                  ('frappe.throw("El solicitante no puede autoaprobar el compromiso.")', 'frappe.throw(_("El solicitante no puede autoaprobar el compromiso."))'),
              ),
              "nexora_app/nexora/nexora/doctype/nxr_fund_allocation/nxr_fund_allocation.py": (
                  ('frappe.throw("La asignación debe ser mayor que cero.")', 'frappe.throw(_("La asignación debe ser mayor que cero."))'),
              ),
              "nexora_app/nexora/nexora/doctype/nxr_fund_source/nxr_fund_source.py": (
                  ('frappe.throw("El importe y la tasa deben ser mayores que cero.")', 'frappe.throw(_("El importe y la tasa deben ser mayores que cero."))'),
                  ('frappe.throw("El efectivo no debe exigir ni almacenar institución o cuenta bancaria.")', 'frappe.throw(_("El efectivo no debe exigir ni almacenar institución o cuenta bancaria."))'),
                  ('frappe.throw(f"{self.channel} requiere {\', \'.join(missing)}.")', 'frappe.throw(_("{0} requiere {1}.").format(self.channel, ", ".join(missing)))'),
              ),
              "nexora_app/nexora/nexora/doctype/nxr_operation/nxr_operation.py": (
                  ('frappe.throw("El importe de la operación debe ser mayor que cero.")', 'frappe.throw(_("El importe de la operación debe ser mayor que cero."))'),
                  ('frappe.throw("La tasa debe ser mayor que cero.")', 'frappe.throw(_("La tasa debe ser mayor que cero."))'),
                  ('frappe.throw("Solicitante, aprobador y ejecutor deben ser tres usuarios distintos.")', 'frappe.throw(_("Solicitante, aprobador y ejecutor deben ser tres usuarios distintos."))'),
                  ('frappe.throw("Una devolución real requiere evidencia.")', 'frappe.throw(_("Una devolución real requiere evidencia."))'),
              ),
              "nexora_app/nexora/nexora/doctype/nxr_operation_effect/nxr_operation_effect.py": (
                  ('frappe.throw("Un efecto canónico no puede ser cero.")', 'frappe.throw(_("Un efecto canónico no puede ser cero."))'),
              ),
          }
          for path, replacements in translated.items():
              replace(path, "import frappe\n", "import frappe\nfrom frappe import _\n")
              for old, new in replacements:
                  replace(path, old, new)

          (root / "nexora_app/nexora/patches/v0_1/create_sequence_counter.py").write_text(
              '''from __future__ import annotations\n\nimport frappe\n\n\ndef execute() -> None:\n\tfrappe.db.sql(\n\t\t"""\n        CREATE TABLE IF NOT EXISTS `tabNXR Document Sequence Counter` (\n            `id` BIGINT UNSIGNED NOT NULL AUTO_INCREMENT,\n            `issued_at` DATETIME(6) NOT NULL DEFAULT CURRENT_TIMESTAMP(6),\n            PRIMARY KEY (`id`)\n        ) ENGINE=InnoDB\n        """\n\t)\n''',
              encoding="utf-8",
          )

          replace("nexora_app/nexora/permissions.py", "import frappe\n", "import frappe\nfrom frappe import _\n")
          for old, new in (
              ('frappe.throw("Autenticación requerida.", frappe.PermissionError)', 'frappe.throw(_("Autenticación requerida."), frappe.PermissionError)'),
              ('frappe.throw(f"Acción NEXORA desconocida: {action}.", frappe.PermissionError)', 'frappe.throw(_("Acción NEXORA desconocida: {0}.").format(action), frappe.PermissionError)'),
              ('frappe.throw(f"El usuario no tiene permiso de servidor para {action}.", frappe.PermissionError)', 'frappe.throw(_("El usuario no tiene permiso de servidor para {0}.").format(action), frappe.PermissionError)'),
          ):
              replace("nexora_app/nexora/permissions.py", old, new)

          concurrency = root / "nexora_app/nexora/tests/concurrency_probe.py"
          text = concurrency.read_text(encoding="utf-8")
          text = text.replace("\tfrappe.set_user(executor)\n", "\t# Test-only identity switch required to exercise server-side authorization.\n\tfrappe.set_user(executor)  # nosemgrep\n", 1)
          text = text.replace("\tfrappe.db.commit()\n", "\t# Fixture data must be visible to two independent MariaDB worker connections.\n\tfrappe.db.commit()  # nosemgrep\n", 1)
          text = text.replace("\t\tfrappe.set_user(executor)\n", "\t\t# Test-only identity switch inside an isolated worker connection.\n\t\tfrappe.set_user(executor)  # nosemgrep\n", 1)
          text = text.replace("\t\t\tfrappe.db.commit()\n", "\t\t\t# Commit the worker transaction to prove row-lock serialization.\n\t\t\tfrappe.db.commit()  # nosemgrep\n", 1)
          text = text.replace("\tfrappe.set_user(executor)\n", "\t# Restore the test actor before permission-checked balance reads.\n\tfrappe.set_user(executor)  # nosemgrep\n", 1)
          concurrency.write_text(text, encoding="utf-8")

          (root / "nexora_app/nexora/public/js/nexora.js").write_text(
              'frappe.provide("nexora");\n\nwindow.nexora.identity = Object.freeze({\n\tproduct: "NEXORA",\n\tdescription: "Gestión Integral de Fondos, Proyectos y Operaciones",\n});\n',
              encoding="utf-8",
          )
          replace("scripts/validate_nexora_governance.py", 'source, target = [part.strip() for part in value.split("→", 1)]', 'source, target = (part.strip() for part in value.split("→", 1))')
          replace("nexora_app/nexora/tests/test_financial_service_contract.py", 'self.assertIn("ORDER BY name FOR UPDATE", text)', 'self.assertIn(".orderby(source.name)", text)\n\t\tself.assertIn(".for_update()", text)')
          PY
          rm .github/workflows/nexora-quality-bootstrap.yml
      - name: Validate corrected NEXORA tree
        run: |
          set -euo pipefail
          python scripts/validate_nexora_governance.py --expected-main-head 73c9dadfb81f543e53f45887448fdecbee081850
          python scripts/validate_nexora_app.py
          python scripts/validate_nexora_financial_models.py
          python -m unittest discover -s nexora_app/nexora/tests -p 'test_*contract.py' -v
          PYTHONPATH=nexora_app python -m unittest nexora.tests.test_financial_core -v
          node --check nexora_app/nexora/nexora/page/nexora_finance/nexora_finance.js
          node --check nexora_app/nexora/public/js/nexora.js
          python -m compileall -q nexora_app/nexora scripts
      - name: Publish quality corrections
        shell: bash
        run: |
          set -euo pipefail
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          git config user.name "nexora-ci"
          git config user.email "nexora-ci@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(nexora): satisfy security and repository quality gates"
          git push origin HEAD:nexora-reconstruccion
