name: Finalize ConstruControl v1.0.1 hotfix tree

on:
  push:
    branches:
      - hotfix/construcontrol-v1.0.1-admin-corrections

permissions:
  contents: write

concurrency:
  group: construcontrol-v1-0-1-finalize
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/construcontrol-v1.0.1-admin-corrections
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install formatter
        run: pip install pre-commit==3.8.0

      - name: Apply reviewed security fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          security = Path('erpnext/construcontrol/admin_correction_security.py')
          text = security.read_text(encoding='utf-8')
          old = 'frappe.db.commit()\n\tfrappe.throw'
          new = 'frappe.db.commit()  # nosemgrep: preserve lockout evidence before failed request rollback\n\tfrappe.throw'
          if old in text:
              text = text.replace(old, new, 1)
          security.write_text(text, encoding='utf-8')

          client = Path('erpnext/public/js/construcontrol_admin_corrections.js')
          text = client.read_text(encoding='utf-8')
          old = 'frappe.msgprint("La cuenta por pagar fue reconstruida desde el gasto canónico.");'
          new = 'frappe.msgprint(__("La cuenta por pagar fue reconstruida desde el gasto canónico."));'
          if old in text:
              text = text.replace(old, new, 1)
          client.write_text(text, encoding='utf-8')
          PY

      - name: Apply repository formatting
        run: |
          set -euo pipefail
          pre-commit run --all-files || true
          pre-commit run --all-files

      - name: Remove temporary workflow and regenerate exact inventory
        run: |
          set -euo pipefail
          rm .github/workflows/hotfix-v1-0-1-finalize.yml
          python scripts/generate_file_inventory.py
          pre-commit run --all-files || true
          python scripts/generate_file_inventory.py
          pre-commit run --all-files
          python scripts/generate_file_inventory.py --check
          python erpnext/construcontrol/tests/test_admin_corrections_contract_standalone.py
          python -m compileall -q erpnext/construcontrol
          node --check erpnext/public/js/construcontrol_admin_corrections.js
          node --check erpnext/construcontrol/page/construcontrol_migration_console/construcontrol_migration_console.js

      - name: Publish finalized tree
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          test -n "$(git status --porcelain)"
          git commit -m 'chore(hotfix): finalize formatting and inventory'
          git push origin HEAD:hotfix/construcontrol-v1.0.1-admin-corrections
