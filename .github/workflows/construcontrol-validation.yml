name: ConstruControl validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.2
      - name: Validate repository and Docker Compose topology
        run: python scripts/validate_repository.py
      - name: Run standalone migration tests
        run: python erpnext/construcontrol/tests/test_schema_standalone.py -v
      - name: Validate Coolify deployment shell syntax
        run: bash -n deploy/coolify/*.sh
      - name: Compile ConstruControl Python
        run: |
          python -m py_compile \
            erpnext/construcontrol/migration/importer.py \
            erpnext/construcontrol/migration/remote_importer.py \
            erpnext/construcontrol/storage/supabase.py \
            scripts/export_supabase_snapshot.py \
            scripts/create_migration_bundle.py \
            scripts/archive_backup_set.py \
            scripts/verify_backup_manifest.py \
            scripts/supabase_storage_transfer.py \
            scripts/upload_backup_set.py

  arm64-container-build:
    runs-on: ubuntu-latest
    needs: static-validation
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build the Oracle Ampere ARM64 application image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          load: true
          tags: construcontrol-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify image user and Coolify scripts
        run: |
          docker run --rm --platform linux/arm64 --entrypoint bash construcontrol-app:ci -lc '
            test "$(id -un)" = "frappe" &&
            test -x /home/frappe/frappe-bench/apps/erpnext/deploy/coolify/init-site.sh &&
            test -x /home/frappe/frappe-bench/apps/erpnext/deploy/coolify/start-backend.sh &&
            test -x /home/frappe/frappe-bench/apps/erpnext/deploy/coolify/backup-now.sh
          '
