name: ConstruControl production validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: construcontrol-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Static, migration and security validation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.2

      - name: Validate repository source of truth
        run: python scripts/validate_repository.py

      - name: Validate ConstruControl integration
        run: python scripts/validate_construcontrol_integration.py

      - name: Validate completion requirements
        run: python scripts/validate_construcontrol_completion.py

      - name: Validate ConstruControl architecture contract
        run: python scripts/validate_construcontrol_architecture.py

      - name: Run migration schema tests
        run: python erpnext/construcontrol/tests/test_schema_standalone.py -v

      - name: Run Supabase backup reader tests
        run: python erpnext/construcontrol/tests/test_backup_reader_standalone.py -v

      - name: Run identity and inventory normalization tests
        run: python erpnext/construcontrol/tests/test_normalization_standalone.py -v

      - name: Run construction-only catalog tests
        run: python erpnext/construcontrol/tests/test_catalog_rules_standalone.py -v

      - name: Compile ConstruControl Python
        run: |
          python -m py_compile \
            erpnext/construcontrol/api.py \
            erpnext/construcontrol/audit.py \
            erpnext/construcontrol/controllers.py \
            erpnext/construcontrol/install.py \
            erpnext/construcontrol/integration.py \
            erpnext/construcontrol/permissions.py \
            erpnext/construcontrol/reporting.py \
            erpnext/construcontrol/reporting_install.py \
            erpnext/construcontrol/weekly.py \
            erpnext/construcontrol/weekly_install.py \
            erpnext/construcontrol/workspace_cleanup.py \
            erpnext/construcontrol/migration/schema.py \
            erpnext/construcontrol/migration/catalog_rules.py \
            erpnext/construcontrol/migration/normalization.py \
            erpnext/construcontrol/migration/native_records.py \
            erpnext/construcontrol/migration/importer.py \
            erpnext/construcontrol/migration/operational_importer.py \
            erpnext/construcontrol/migration/backup_reader.py \
            erpnext/construcontrol/migration/remote_importer.py \
            erpnext/construcontrol/storage/supabase.py \
            scripts/validate_construcontrol_architecture.py \
            scripts/validate_construcontrol_completion.py \
            scripts/build_release_archive.py \
            scripts/export_supabase_snapshot.py \
            scripts/create_migration_bundle.py \
            scripts/archive_backup_set.py \
            scripts/verify_backup_manifest.py \
            scripts/supabase_storage_transfer.py \
            scripts/upload_backup_set.py

      - name: Validate responsive assets and manifest
        run: |
          node --check erpnext/public/js/construcontrol_mobile.js
          python -c "import json,pathlib; json.loads(pathlib.Path('erpnext/public/construcontrol/manifest.webmanifest').read_text())"
          test -s erpnext/public/css/construcontrol.css
          test -s erpnext/public/construcontrol/icon.svg

      - name: Validate Coolify shell syntax
        run: bash -n deploy/coolify/*.sh

      - name: Parse active Docker Compose
        run: python -c "import pathlib,yaml; yaml.safe_load(pathlib.Path('docker-compose.yml').read_text())"

  amd64-container-build:
    name: Build AWS EC2 x86_64 image
    runs-on: ubuntu-latest
    needs: static-validation
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build the production application image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: construcontrol-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image user architecture assets and deployment scripts
        run: |
          docker run --rm --platform linux/amd64 --entrypoint bash construcontrol-app:ci -lc '
            test "$(id -un)" = "frappe" &&
            test "$(uname -m)" = "x86_64" &&
            test -x /home/frappe/frappe-bench/apps/erpnext/deploy/coolify/init-site.sh &&
            test -x /home/frappe/frappe-bench/apps/erpnext/deploy/coolify/start-backend.sh &&
            test -x /home/frappe/frappe-bench/apps/erpnext/deploy/coolify/backup-now.sh &&
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/public/css/construcontrol.css &&
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/public/js/construcontrol_mobile.js &&
            python -m py_compile \
              /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/api.py \
              /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/audit.py \
              /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/controllers.py \
              /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/reporting.py \
              /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/weekly.py \
              /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/migration/catalog_rules.py \
              /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/migration/importer.py \
              /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/storage/supabase.py
          '

  source-release:
    name: Build verified source ZIP
    runs-on: ubuntu-latest
    needs: [static-validation, amd64-container-build]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build deterministic source archive and SHA-256
        run: python scripts/build_release_archive.py

      - name: Upload verified ConstruControl release
        uses: actions/upload-artifact@v4
        with:
          name: ConstruControl-${{ github.sha }}
          path: |
            dist/ConstruControl-*.zip
            dist/ConstruControl-*.sha256
          if-no-files-found: error
          retention-days: 30
