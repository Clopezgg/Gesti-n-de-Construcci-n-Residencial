name: ConstruControl production validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: construcontrol-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Product, migration and security validation
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.2

      - name: Validate repository and ConstruControl contracts
        run: |
          python scripts/validate_repository.py
          python scripts/validate_construcontrol_integration.py
          python scripts/validate_construcontrol_completion.py
          python scripts/validate_construcontrol_architecture.py
          python scripts/validate_construcontrol_data_contract.py
          python scripts/validate_construcontrol_product.py

      - name: Run all standalone ConstruControl tests
        run: python -m unittest discover -s erpnext/construcontrol/tests -p 'test_*_standalone.py' -v

      - name: Compile all ConstruControl Python
        run: |
          python - <<'PY'
          from pathlib import Path
          import py_compile

          roots = [Path('erpnext/construcontrol'), Path('scripts')]
          failures = []
          for root in roots:
              for path in root.rglob('*.py'):
                  try:
                      py_compile.compile(str(path), doraise=True)
                  except Exception as exc:
                      failures.append(f'{path}: {exc}')
          if failures:
              raise SystemExit('\n'.join(failures))
          print('ConstruControl Python compilation passed')
          PY

      - name: Validate all ConstruControl JavaScript
        run: |
          find erpnext/public/js -maxdepth 1 -type f -name 'construcontrol*.js' -print0 | xargs -0 -n1 node --check
          find erpnext/construcontrol/page -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Validate PWA and visual assets
        run: |
          python -c "import json,pathlib; json.loads(pathlib.Path('erpnext/public/construcontrol/manifest.webmanifest').read_text())"
          test -s erpnext/public/css/construcontrol_canonical.css
          test -s erpnext/public/css/construcontrol_finance.css
          test -s erpnext/public/css/construcontrol_expenses.css
          test -s erpnext/public/css/construcontrol_ux.css
          test -s erpnext/public/construcontrol/favicon-32.png
          test -s erpnext/public/construcontrol/apple-touch-icon-180.png
          test -s erpnext/public/construcontrol/icon-192.png
          test -s erpnext/public/construcontrol/icon-512.png

      - name: Validate deployment definitions
        run: |
          bash -n deploy/coolify/*.sh
          python -c "import pathlib,yaml; yaml.safe_load(pathlib.Path('docker-compose.yml').read_text())"
          grep -R --line-number -E 'docker (system|volume) prune|down -v' deploy docker-compose.yml && exit 1 || true

  runtime-compose-validation:
    name: Real site, repeated migration, CRUD and persistence
    runs-on: ubuntu-latest
    needs: static-validation
    timeout-minutes: 75
    env:
      SITE_NAME: construcontrol-ci
      DB_NAME: _construcontrol_ci
      DB_PASSWORD: ConstruControlCiApp2026
      DB_ROOT_PASSWORD: ConstruControlCiRoot2026
      ADMIN_PASSWORD: ConstruControlCiAdmin2026
      FRAPPE_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      ERPNEXT_VERSION: v15.117.0
      TZ: America/Tegucigalpa
      SUPABASE_STORAGE_MODE: disabled
    steps:
      - uses: actions/checkout@v4

      - name: Build and initialize a real ConstruControl site
        run: docker compose up -d --build backend

      - name: Wait for the backend health check
        shell: bash
        run: |
          set -euo pipefail
          container="$(docker compose ps -q backend)"
          test -n "$container"
          for attempt in $(seq 1 90); do
            state="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container")"
            if [[ "$state" == "healthy" ]]; then
              exit 0
            fi
            if [[ "$state" == "unhealthy" || "$state" == "exited" || "$state" == "dead" ]]; then
              docker compose logs --no-color backend
              exit 1
            fi
            sleep 10
          done
          docker compose logs --no-color backend
          exit 1

      - name: Prove repeated bench migrate is idempotent
        run: |
          docker compose exec -T backend bench --site "$SITE_NAME" migrate
          docker compose exec -T backend bench --site "$SITE_NAME" migrate

      - name: Run Administrator correction integration tests on the real site
        run: |
          docker compose exec -T backend bench --site "$SITE_NAME" set-config allow_tests true
          docker compose exec -T backend bench --site "$SITE_NAME" run-tests --module erpnext.construcontrol.tests.test_admin_corrections_mariadb

      - name: Execute real FI01 FI02 FI03 CRUD and reconciliation
        run: docker compose exec -T backend bench --site "$SITE_NAME" execute erpnext.construcontrol.tests.runtime_smoke.run

      - name: Prove database persistence across backend restart
        run: |
          docker compose exec -T backend bench --site "$SITE_NAME" execute erpnext.construcontrol.tests.runtime_smoke.create_persistence_marker --kwargs '{"marker":"CONSTRUCONTROL-CI-PERSISTENCE"}'
          docker compose restart backend
          container="$(docker compose ps -q backend)"
          for attempt in $(seq 1 60); do
            state="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container")"
            [[ "$state" == "healthy" ]] && break
            [[ "$state" == "unhealthy" || "$state" == "exited" || "$state" == "dead" ]] && { docker compose logs --no-color backend; exit 1; }
            sleep 10
          done
          test "$(docker inspect --format '{{.State.Health.Status}}' "$container")" = "healthy"
          docker compose exec -T backend bench --site "$SITE_NAME" execute erpnext.construcontrol.tests.runtime_smoke.verify_and_cleanup_persistence_marker --kwargs '{"marker":"CONSTRUCONTROL-CI-PERSISTENCE"}'

      - name: Generate and verify a real backup set
        shell: bash
        run: |
          set -euo pipefail
          docker compose exec -T backend bench --site "$SITE_NAME" backup --with-files
          docker compose exec -T backend bash -lc 'test -n "$(find sites/$SITE_NAME/private/backups -maxdepth 1 -type f -name "*.sql.gz" -print -quit)"'

      - name: Capture runtime logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop the isolated runtime environment
        if: always()
        run: docker compose down --remove-orphans

  amd64-container-build:
    name: Build AWS EC2 x86_64 image
    runs-on: ubuntu-latest
    needs: static-validation
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build production application image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: construcontrol-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify production image contents
        run: |
          docker run --rm --platform linux/amd64 --entrypoint bash construcontrol-app:ci -lc '
            set -e
            test "$(id -un)" = "frappe"
            test "$(uname -m)" = "x86_64"
            test -x /home/frappe/frappe-bench/apps/erpnext/deploy/coolify/init-site.sh
            test -x /home/frappe/frappe-bench/apps/erpnext/deploy/coolify/start-backend.sh
            test -x /home/frappe/frappe-bench/apps/erpnext/deploy/coolify/backup-now.sh
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/public/js/construcontrol_mobile.js
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/public/js/construcontrol_ux.js
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/public/css/construcontrol_canonical.css
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/public/construcontrol/apple-touch-icon-180.png
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/public/construcontrol/icon-512.png
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/business_rules.py
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/users.py
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/finance.py
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/expenses.py
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/construction.py
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/integrations.py
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/executive.py
            test -s /home/frappe/frappe-bench/apps/erpnext/erpnext/construcontrol/tests/runtime_smoke.py
          '

  source-release:
    name: Build verified source ZIP
    runs-on: ubuntu-latest
    needs: [static-validation, runtime-compose-validation, amd64-container-build]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build deterministic source archive and SHA-256
        run: python scripts/build_release_archive.py

      - name: Upload verified ConstruControl release
        uses: actions/upload-artifact@v4
        with:
          name: ConstruControl-${{ github.sha }}
          path: |
            dist/ConstruControl-*.zip
            dist/ConstruControl-*.sha256
          if-no-files-found: error
          retention-days: 30
