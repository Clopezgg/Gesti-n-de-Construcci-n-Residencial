name: ConstruControl validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.2
      - name: Validate repository, Blueprint, manual, Python, JSON and secret patterns
        run: python scripts/validate_repository.py
      - name: Run standalone migration tests
        run: python erpnext/construcontrol/tests/test_schema_standalone.py -v
      - name: Validate deployment shell syntax
        run: bash -n deploy/render/*.sh
      - name: Compile ConstruControl Python
        run: |
          python -m py_compile \
            erpnext/construcontrol/migration/importer.py \
            erpnext/construcontrol/storage/supabase.py \
            scripts/export_supabase_snapshot.py \
            scripts/create_migration_bundle.py \
            scripts/supabase_storage_transfer.py \
            scripts/upload_backup_set.py

  container-build:
    runs-on: ubuntu-latest
    needs: static-validation
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Build application image
        run: docker build --pull -f Dockerfile -t construcontrol-app:ci .
      - name: Build frontend image
        run: docker build --pull -f deploy/render/Dockerfile.frontend -t construcontrol-frontend:ci .
      - name: Verify application image user and scripts
        run: |
          docker run --rm --entrypoint bash construcontrol-app:ci -lc '
            test "$(id -un)" = "frappe" &&
            test -x /home/frappe/frappe-bench/apps/erpnext/deploy/render/start-backend.sh &&
            test -x /home/frappe/frappe-bench/apps/erpnext/deploy/render/run-backup.sh
          '
      - name: Render and validate nginx configuration
        run: |
          docker run --rm --entrypoint bash \
            -e PORT=8080 \
            -e BACKEND=127.0.0.1:8000 \
            -e SOCKETIO=127.0.0.1:9000 \
            -e FRAPPE_SITE_NAME_HEADER=construcontrol \
            -e UPSTREAM_REAL_IP_ADDRESS=0.0.0.0/0 \
            -e UPSTREAM_REAL_IP_HEADER=X-Forwarded-For \
            -e UPSTREAM_REAL_IP_RECURSIVE=on \
            -e PROXY_READ_TIMEOUT=120 \
            -e CLIENT_MAX_BODY_SIZE=50m \
            construcontrol-frontend:ci -lc '
              envsubst '\''${PORT} ${BACKEND} ${SOCKETIO} ${UPSTREAM_REAL_IP_ADDRESS} ${UPSTREAM_REAL_IP_HEADER} ${UPSTREAM_REAL_IP_RECURSIVE} ${FRAPPE_SITE_NAME_HEADER} ${PROXY_READ_TIMEOUT} ${CLIENT_MAX_BODY_SIZE}'\'' \
                < /home/frappe/frappe-bench/apps/erpnext/deploy/render/nginx.conf.template \
                > /etc/nginx/conf.d/frappe.conf &&
              nginx -t
            '
