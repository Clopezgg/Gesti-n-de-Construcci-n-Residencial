name: NEXORA financial invariants

on:
  push:
    branches: [nexora-reconstruccion, nexora-continuidad-total]
    paths:
      - EXECUTION_STATE.md
      - nexora_app/**
      - scripts/validate_nexora_app.py
      - scripts/validate_nexora_financial_models.py
      - scripts/register_nexora_app.py
      - scripts/validate_nexora_governance.py
      - .github/workflows/nexora-financial.yml
  pull_request:
    branches: [main, nexora-reconstruccion]
    paths:
      - EXECUTION_STATE.md
      - nexora_app/**
      - scripts/validate_nexora_app.py
      - scripts/validate_nexora_financial_models.py
      - scripts/register_nexora_app.py
      - scripts/validate_nexora_governance.py
      - .github/workflows/nexora-financial.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mariadb:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    services:
      mysql:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=5s --health-timeout=3s --health-retries=20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Static and deterministic gates
        run: |
          set -euo pipefail
          mkdir -p artifacts/nexora-financial
          {
            python scripts/validate_nexora_governance.py --expected-main-head 73c9dadfb81f543e53f45887448fdecbee081850
            python scripts/validate_nexora_app.py
            python scripts/validate_nexora_financial_models.py
            python -m unittest discover -s nexora_app/nexora/tests -p 'test_*contract.py' -v
            PYTHONPATH=nexora_app python -m unittest nexora.tests.test_financial_core nexora.tests.test_ledger_core nexora.tests.test_reference_rules nexora.tests.test_evidence_core nexora.tests.test_directory_core nexora.tests.test_contract_core nexora.tests.test_purchase_core nexora.tests.test_purchase_request_core -v
            node --check nexora_app/nexora/nexora/page/nexora_finance/nexora_finance.js
            node --check nexora_app/nexora/nexora/page/nexora_evidence/nexora_evidence.js
            node --check nexora_app/nexora/nexora/page/nexora_entities/nexora_entities.js
            node --check nexora_app/nexora/nexora/page/nexora_contracts/nexora_contracts.js
            node --check nexora_app/nexora/nexora/page/nexora_suppliers/nexora_suppliers.js
            node --check nexora_app/nexora/nexora/page/nexora_purchase_requests/nexora_purchase_requests.js
            node --check nexora_app/nexora/public/js/nexora.js
            python -m compileall -q nexora_app/nexora scripts
          } 2>&1 | tee artifacts/nexora-financial/static.log
      - name: Install ERPNext test bench
        run: bash .github/helper/install.sh 2>&1 | tee artifacts/nexora-financial/install.log
        env:
          DB: mariadb
          TYPE: server
          FRAPPE_USER: frappe
          FRAPPE_BRANCH: version-15
          PAYMENTS_BRANCH: version-15
      - name: Prepare NEXORA app in bench
        shell: bash
        run: |
          set -euo pipefail
          cd ~/frappe-bench
          ln -s "$GITHUB_WORKSPACE/nexora_app" apps/nexora
          ./env/bin/pip install -e apps/nexora 2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/app-package.log"
          python "$GITHUB_WORKSPACE/scripts/register_nexora_app.py" sites/apps.txt
      - name: Install and verify NEXORA on clean MariaDB site
        shell: bash
        run: |
          set -euo pipefail
          cd ~/frappe-bench
          {
            bench --site test_site install-app nexora
            bench --site test_site migrate
            bench --site test_site list-apps
            bench --site test_site run-tests --app nexora --module nexora.tests.test_installation
          } 2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/app-install.log"
      - name: Prove clean-site coexistence and rollback
        shell: bash
        run: |
          set -euo pipefail
          cd ~/frappe-bench
          {
            test -d "$GITHUB_WORKSPACE/erpnext/construcontrol"
            bench --site test_site execute erpnext.construcontrol.tests.runtime_smoke.run
            bench --site test_site uninstall-app nexora --yes
            apps="$(bench --site test_site list-apps)"
            printf '%s\n' "$apps"
            if printf '%s\n' "$apps" | awk 'NF {print $1}' | grep -qx nexora; then exit 1; fi
            printf '%s\n' "$apps" | awk 'NF {print $1}' | grep -qx erpnext
            bench --site test_site install-app nexora
            bench --site test_site migrate
            bench --site test_site run-tests --app nexora --module nexora.tests.test_installation
          } 2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/coexistence-rollback.log"
      - name: Prove financial, directory, contract, supplier and request invariants with rollback on MariaDB
        shell: bash
        run: |
          set -euo pipefail
          cd ~/frappe-bench
          bench --site test_site run-tests --app nexora --module nexora.tests.test_financial_integration \
            2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/financial-integration.log"
          bench --site test_site run-tests --app nexora --module nexora.tests.test_ledger_integration \
            2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/ledger-integration.log"
          bench --site test_site run-tests --app nexora --module nexora.tests.test_evidence_integration \
            2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/evidence-integration.log"
          bench --site test_site run-tests --app nexora --module nexora.tests.test_directory_integration \
            2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/directory-integration.log"
          bench --site test_site run-tests --app nexora --module nexora.tests.test_contract_integration \
            2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/contract-integration.log"
          bench --site test_site run-tests --app nexora --module nexora.tests.test_purchase_integration \
            2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/purchase-integration.log"
          bench --site test_site run-tests --app nexora --module nexora.tests.test_purchase_request_integration \
            2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/purchase-request-integration.log"
      - name: Prove concurrent financial and directory locking with independent connections
        shell: bash
        run: |
          set -euo pipefail
          cd ~/frappe-bench
          bench --site test_site execute nexora.tests.concurrency_probe.run \
            2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/concurrency.log"
          bench --site test_site execute nexora.tests.directory_concurrency_probe.run \
            2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/directory-concurrency.log"
          bench --site test_site execute nexora.tests.contract_concurrency_probe.run \
            2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/contract-concurrency.log"
      - name: Prove idempotent NEXORA staging data
        shell: bash
        run: |
          set -euo pipefail
          cd ~/frappe-bench
          {
            bench --site test_site set-config nexora_staging 1
            bench --site test_site execute nexora.financial.seeds.seed_demo_data
            bench --site test_site execute nexora.financial.seeds.seed_demo_data
            bench --site test_site execute nexora.financial.seeds.assert_staging_health
          } 2>&1 | tee "$GITHUB_WORKSPACE/artifacts/nexora-financial/staging.log"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nexora-financial-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/nexora-financial
          if-no-files-found: error
          retention-days: 30
