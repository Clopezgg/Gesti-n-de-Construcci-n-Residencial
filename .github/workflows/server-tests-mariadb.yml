name: Server (Mariadb)

on:
  workflow_dispatch:
    inputs:
      gate:
        description: 'Certification gate to execute'
        required: true
        type: choice
        options:
          - A
          - B
          - C
          - FINAL
      user:
        description: 'Frappe Framework repository user (add your username for forks)'
        required: true
        default: 'frappe'
        type: string
      branch:
        description: 'Frappe Framework branch'
        default: 'v15.115.4'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: server-mariadb-${{ github.event.inputs.gate }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false

      matrix:
        container: [1, 2, 3, 4]

    name: Python Unit Tests · Gate ${{ github.event.inputs.gate }} · Shard ${{ matrix.container }}

    services:
      mysql:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: 'root'
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for valid Python & Merge Conflicts
        run: |
          python -m compileall -f "${GITHUB_WORKSPACE}"
          if grep -lr --exclude-dir=node_modules "^<<<<<<< " "${GITHUB_WORKSPACE}"
              then echo "Found merge conflicts"
              exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          check-latest: true

      - name: Add to Hosts
        run: echo "127.0.0.1 test_site" | sudo tee -a /etc/hosts

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Cache node modules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        shell: bash
        run: echo "dir=$(yarn cache dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install
        run: bash ${GITHUB_WORKSPACE}/.github/helper/install.sh
        env:
          DB: mariadb
          TYPE: server
          FRAPPE_USER: ${{ github.event.inputs.user || 'frappe' }}
          FRAPPE_BRANCH: ${{ github.event.inputs.branch || 'v15.115.4' }}
          PAYMENTS_BRANCH: version-15

      - name: Prepare deterministic ERPNext fixtures
        run: |
          cd ~/frappe-bench/
          bench --site test_site run-tests \
            --module erpnext.construcontrol.tests.test_mariadb_shared_fixtures
          bench --site test_site execute \
            erpnext.stock.doctype.warehouse.test_warehouse.create_warehouse \
            --args '["RJ Warehouse"]'

      - name: Run Tests
        shell: bash
        run: |
          set +e
          cd ~/frappe-bench/
          LOG_FILE="${RUNNER_TEMP}/mariadb-tests-${{ matrix.container }}.log"
          bench --site test_site run-parallel-tests \
            --app erpnext \
            --total-builds 4 \
            --build-number ${{ matrix.container }} \
            >"${LOG_FILE}" 2>&1
          status=$?
          if [ "${status}" -ne 0 ]; then
            echo "::group::MariaDB shard ${{ matrix.container }} failure tail"
            tail -n 600 "${LOG_FILE}"
            echo "::endgroup::"
          else
            tail -n 80 "${LOG_FILE}"
          fi
          exit "${status}"
        env:
          TYPE: server
          CI_BUILD_ID: ${{ github.run_id }}
          ORCHESTRATOR_URL: http://test-orchestrator.frappe.io

      - name: Upload MariaDB evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: mariadb-gate-${{ github.event.inputs.gate }}-${{ matrix.container }}-${{ github.sha }}
          path: ${{ runner.temp }}/mariadb-tests-${{ matrix.container }}.log
          if-no-files-found: warn
          retention-days: 14

      - name: Show bench output
        if: ${{ always() }}
        run: cat ~/frappe-bench/bench_start.log || true
