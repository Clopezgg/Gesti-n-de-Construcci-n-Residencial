name: NEXORA Block 3 publisher

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/nexora-block3-publisher.yml
      - .nexora/block3-transport/**
      - nexora_app/**

permissions:
  contents: write

concurrency:
  group: nexora-block3-publisher-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nexora-reconstruccion
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Verify reviewed package and authorized recovery commit
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "5715160a425d3729c325f1c74dd8a9f65a34e993"
          test -d .nexora/block3-transport
          mkdir -p "$RUNNER_TEMP/nexora-block3"
          cat .nexora/block3-transport/part-* | base64 --decode > "$RUNNER_TEMP/nexora-block3.tar.gz"
          test "$(sha256sum "$RUNNER_TEMP/nexora-block3.tar.gz" | awk '{print $1}')" = "43c440fd174dab4c0f721d428e6aca36a326777a78d2623b5607f9632b321a41"
          tar -xzf "$RUNNER_TEMP/nexora-block3.tar.gz" -C "$RUNNER_TEMP/nexora-block3"
          cd "$RUNNER_TEMP/nexora-block3"
          sha256sum --check SHA256SUMS

      - name: Materialize and validate final Block 3 tree
        shell: bash
        run: |
          set -euo pipefail
          rsync -a "$RUNNER_TEMP/nexora-block3/commit2/" ./
          rsync -a "$RUNNER_TEMP/nexora-block3/commit3/" ./
          cp .github/workflows/nexora-financial.yml "$RUNNER_TEMP/nexora-financial.yml"
          rm -rf .nexora/block3-transport .github/workflows/nexora-block3-publisher.yml
          python scripts/generate_file_inventory.py
          python scripts/validate_nexora_governance.py --expected-main-head 73c9dadfb81f543e53f45887448fdecbee081850
          python scripts/validate_nexora_app.py
          python scripts/validate_nexora_financial_models.py
          python -m unittest discover -s nexora_app/nexora/tests -p 'test_*contract.py' -v
          PYTHONPATH=nexora_app python -m unittest nexora.tests.test_financial_core nexora.tests.test_ledger_core nexora.tests.test_reference_rules -v
          node --check nexora_app/nexora/nexora/page/nexora_finance/nexora_finance.js
          python -m compileall -q nexora_app/nexora scripts
          python scripts/validate_repository.py

      - name: Publish code and stage workflow content for API cleanup
        shell: bash
        run: |
          set -euo pipefail
          git restore --source=HEAD -- .github/workflows
          mkdir -p .nexora/block3-staged
          cp "$RUNNER_TEMP/nexora-financial.yml" .nexora/block3-staged/nexora-financial.yml
          git config user.name "NEXORA CI Publisher"
          git config user.email "noreply@github.com"
          git add -A
          git commit -m "test(nexora): prove central ledger reference invariants"
          git push origin HEAD:nexora-reconstruccion
