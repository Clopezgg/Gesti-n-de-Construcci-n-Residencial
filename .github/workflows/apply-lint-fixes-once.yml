name: Apply lint and runtime fixes once

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'reconstruccion-definitiva-construcontrol'
    name: Apply canonical lint, Semgrep and runtime fixes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: reconstruccion-definitiva-construcontrol
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install exact pre-commit runner
        run: pip install pre-commit==3.8.0

      - name: Apply and validate the complete correction batch
        env:
          BASE_SHA: 56ad5d9186075b66a89c773bb9c5922329f5687e
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          pre-commit run --from-ref "$BASE_SHA" --to-ref "$HEAD_SHA" --show-diff-on-failure || true

          python - <<'PY'
          from pathlib import Path

          replacements = {
              "erpnext/construcontrol/construction.py": [
                  ("isinstance(value, (int, float))", "isinstance(value, int | float)"),
              ],
              "erpnext/construcontrol/tests/test_expense_status_schema_standalone.py": [
                  (
                      "isinstance(node, (ast.Assign, ast.AnnAssign))",
                      "isinstance(node, ast.Assign | ast.AnnAssign)",
                  ),
              ],
              "erpnext/construcontrol/tests/test_fi02_lifecycle_standalone.py": [
                  (
                      "isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef))",
                      "isinstance(node, ast.FunctionDef | ast.AsyncFunctionDef)",
                  ),
              ],
              "scripts/validate_construcontrol_product.py": [
                  (
                      "isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef))",
                      "isinstance(node, ast.FunctionDef | ast.AsyncFunctionDef)",
                  ),
              ],
              "erpnext/construcontrol/page/construcontrol_reporting_center/construcontrol_reporting_center.js": [
                  (
                      'frappe.msgprint("Seleccione un proyecto para generar, exportar o notificar.");',
                      'frappe.msgprint(__("Seleccione un proyecto para generar, exportar o notificar."));',
                  ),
              ],
              "erpnext/construcontrol/tests/test_install_entrypoint_standalone.py": [
                  (
                      'frappe.flags = flags if flags is not None else Flags()',
                      'setattr(frappe, "flags", flags if flags is not None else Flags())',
                  ),
              ],
          }

          for relative, pairs in replacements.items():
              path = Path(relative)
              text = path.read_text(encoding="utf-8")
              for old, new in pairs:
                  count = text.count(old)
                  if count != 1:
                      raise RuntimeError(
                          f"{relative}: expected one occurrence of {old!r}, found {count}"
                      )
                  text = text.replace(old, new)
              path.write_text(text, encoding="utf-8")

          hooks = Path("erpnext/hooks.py")
          text = hooks.read_text(encoding="utf-8")
          text = text.replace("  # noqa: F401,F403", "")
          text = text.replace("  # noqa: F405", "")
          hooks.write_text(text, encoding="utf-8")

          weekly = Path("erpnext/construcontrol/weekly_impl.py")
          text = weekly.read_text(encoding="utf-8")
          helper_marker = "\ndef _snapshot(project: str, start: Any, end: Any) -> dict[str, Any]:\n"
          helper = '''

def _quality_failure_count(project: str, start: Any, end: Any) -> int:
	meta = frappe.get_meta("CC Progress Update")
	quality_field = next(
		(fieldname for fieldname in ("quality_status", "quality") if meta.has_field(fieldname)),
		"",
	)
	if not quality_field:
		return 0
	filters: dict[str, Any] = {
		**_filters(project),
		"is_logically_deleted": 0,
		"posting_date": ["between", [start, end]],
		quality_field: [
			"in",
			["failed", "rejected", "non_compliant", "attention", "poor", "corrective"],
		],
	}
	if meta.has_field("incident_status"):
		filters["incident_status"] = ["!=", "resolved"]
	return frappe.db.count("CC Progress Update", filters)
'''
          if helper_marker not in text:
              raise RuntimeError("weekly_impl.py: snapshot marker not found")
          text = text.replace(helper_marker, helper + helper_marker, 1)
          start_marker = "\tquality_failures = frappe.db.count(\n"
          end_marker = "\n\ttry:\n"
          start_index = text.find(start_marker)
          end_index = text.find(end_marker, start_index)
          if start_index < 0 or end_index < 0:
              raise RuntimeError("weekly_impl.py: legacy quality query not found")
          text = (
              text[:start_index]
              + "\tquality_failures = _quality_failure_count(project, start, end)\n"
              + text[end_index:]
          )
          weekly.write_text(text, encoding="utf-8")
          PY

          rm .github/workflows/apply-lint-fixes-once.yml
          pre-commit run --from-ref "$BASE_SHA" --to-ref "$HEAD_SHA" --show-diff-on-failure
          git diff --check

          git config user.name "ConstruControl CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix(runtime): apply lint and weekly schema corrections"
          git push origin HEAD:reconstruccion-definitiva-construcontrol
