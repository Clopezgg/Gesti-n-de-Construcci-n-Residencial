name: NEXORA governance

on:
  push:
    branches: [nexora-reconstruccion]
    paths:
      - EXECUTION_STATE.md
      - docs/nexora/**
      - docs/architecture/file_inventory.json
      - scripts/generate_file_inventory.py
      - scripts/validate_nexora_governance.py
      - .github/workflows/nexora-governance.yml
  pull_request:
    branches: [main]
    paths:
      - EXECUTION_STATE.md
      - docs/nexora/**
      - docs/architecture/file_inventory.json
      - scripts/generate_file_inventory.py
      - scripts/validate_nexora_governance.py
      - .github/workflows/nexora-governance.yml

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nexora-reconstruccion
          fetch-depth: 0
          token: ${{ github.token }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate executable governance
        run: |
          git fetch origin main --depth=1
          python scripts/validate_nexora_governance.py \
            --expected-main-head "73c9dadfb81f543e53f45887448fdecbee081850"
      - name: Compile governance validator
        run: python -m py_compile scripts/validate_nexora_governance.py
      - name: Generate canonical repository inventory
        run: python scripts/generate_file_inventory.py
      - name: Publish refreshed inventory
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- docs/architecture/file_inventory.json; then
            exit 0
          fi
          git config user.name "NEXORA CI Publisher"
          git config user.email "noreply@github.com"
          git add docs/architecture/file_inventory.json
          git commit -m "chore(nexora): refresh repository file inventory"
          git push origin HEAD:nexora-reconstruccion
      - name: Reject stale repository inventory
        run: git diff --exit-code -- docs/architecture/file_inventory.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nexora-file-inventory-${{ github.event.pull_request.head.sha || github.sha }}
          path: docs/architecture/file_inventory.json
          if-no-files-found: error
          retention-days: 7
