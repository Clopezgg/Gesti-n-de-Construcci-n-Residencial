name: NEXORA governance

on:
  push:
    branches: [nexora-reconstruccion, nexora-continuidad-total]
    paths:
      - EXECUTION_STATE.md
      - docs/nexora/**
      - docs/architecture/file_inventory.json
      - scripts/generate_file_inventory.py
      - scripts/validate_nexora_governance.py
      - .github/workflows/nexora-governance.yml
  pull_request:
    branches: [main, nexora-reconstruccion]
    paths:
      - EXECUTION_STATE.md
      - docs/nexora/**
      - docs/architecture/file_inventory.json
      - scripts/generate_file_inventory.py
      - scripts/validate_nexora_governance.py
      - .github/workflows/nexora-governance.yml

permissions:
  contents: write

jobs:
  materialize-block-6:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: nexora-continuidad-total
      - name: Reconstruct and verify Block 6 archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/block-6-materialization
          cat \
            .nexora-transport/b6.part-01 \
            .nexora-transport/b6.part-02 \
            .nexora-transport/b6.part-03 \
            .nexora-transport/b6.part-04 \
            .nexora-transport/b6.part-05 \
            .nexora-transport/b6.part-06a \
            .nexora-transport/b6.part-06b \
            .nexora-transport/b6.part-07 \
            > /tmp/b6-exact.tar.gz.b64
          base64 -d /tmp/b6-exact.tar.gz.b64 > /tmp/b6-exact.tar.gz
          sha256sum /tmp/b6-exact.tar.gz | tee /tmp/block-6-materialization/archive-sha256.txt
          echo "96d9fb50e807beb3689c3ddb85bb02ece1d478d37851d30a529afa0a16f7f530  /tmp/b6-exact.tar.gz" | sha256sum -c -
      - name: Stage and verify exact reconstructed tree
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/b6-exact.tar.gz -C "$GITHUB_WORKSPACE"
          rm -rf .nexora-transport
          rm -f .github/workflows/nexora-materialize-b6.yml B6_MATERIALIZATION_STATE.md
          git checkout e04086e590641ac30ab6dad50b959a307a0393b8 -- .github/workflows/nexora-governance.yml
          git add -A
          exact_tree="$(git write-tree)"
          echo "$exact_tree" | tee /tmp/block-6-materialization/exact-tree.txt
          git diff --cached --name-status e04086e590641ac30ab6dad50b959a307a0393b8 > /tmp/block-6-materialization/staged-paths.txt
          git diff --cached --stat e04086e590641ac30ab6dad50b959a307a0393b8 > /tmp/block-6-materialization/staged-stat.txt
          if [ "$exact_tree" != "6c923a7f3dd5b36531ef10895c5533bb8fb13a8f" ]; then
            git diff --name-status "$exact_tree" 6c923a7f3dd5b36531ef10895c5533bb8fb13a8f > /tmp/block-6-materialization/tree-diff.txt || true
            exit 1
          fi
      - name: Upload Block 6 materialization diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: block-6-materialization-${{ github.event.pull_request.head.sha }}
          path: /tmp/block-6-materialization
          if-no-files-found: error
          retention-days: 7
      - name: Prepare workflow-neutral functional payload
        shell: bash
        run: |
          set -euo pipefail
          git checkout HEAD -- .github/workflows
          git add -A
          payload_tree="$(git write-tree)"
          echo "payload_tree=$payload_tree"
          test -z "$(git diff --cached --name-only -- .github/workflows)"
      - name: Commit verified functional payload
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "NEXORA Automation"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "feat(nexora): materialize contractor contracts payload"
          git rev-parse HEAD
      - name: Push verified functional payload
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:nexora-continuidad-total

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate executable governance
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          python scripts/validate_nexora_governance.py \
            --expected-main-head "73c9dadfb81f543e53f45887448fdecbee081850"
      - name: Compile governance validators
        run: |
          python -m py_compile \
            scripts/generate_file_inventory.py \
            scripts/validate_nexora_governance.py
      - name: Verify canonical repository inventory
        run: |
          python scripts/generate_file_inventory.py
          git diff --exit-code -- docs/architecture/file_inventory.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nexora-file-inventory-${{ github.event.pull_request.head.sha || github.sha }}
          path: docs/architecture/file_inventory.json
          if-no-files-found: error
          retention-days: 7
