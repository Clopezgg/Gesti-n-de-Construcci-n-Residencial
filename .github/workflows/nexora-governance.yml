name: NEXORA governance

on:
  push:
    branches: [nexora-reconstruccion, nexora-continuidad-total]
    paths:
      - EXECUTION_STATE.md
      - docs/nexora/**
      - docs/architecture/file_inventory.json
      - scripts/generate_file_inventory.py
      - scripts/validate_nexora_governance.py
      - .github/workflows/nexora-governance.yml
  pull_request:
    branches: [main, nexora-reconstruccion]
    paths:
      - EXECUTION_STATE.md
      - docs/nexora/**
      - docs/architecture/file_inventory.json
      - scripts/generate_file_inventory.py
      - scripts/validate_nexora_governance.py
      - .github/workflows/nexora-governance.yml

permissions:
  contents: write

jobs:
  materialize-block-6-fix:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: nexora-continuidad-total
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Apply additive directory compatibility assertion
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("nexora_app/nexora/tests/test_directory_integration.py")
          text = path.read_text()
          old = '\t\tself.assertEqual(before, result["preserved_references"])\n'
          new = (
              '\t\tpreserved = result["preserved_references"]\n'
              '\t\tself.assertEqual(before, {key: preserved[key] for key in before})\n'
              '\t\tself.assertEqual(0, preserved["contractor_profiles"])\n'
              '\t\tself.assertEqual(0, preserved["contracts"])\n'
          )
          if old in text:
              path.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit("directory compatibility assertion target not found")
          PY
      - name: Reproduce official pre-commit formatting
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install pre-commit
          pre-commit run --all-files || true
          pre-commit run --all-files
      - name: Verify exact corrected Block 6 tree and regressions
        shell: bash
        run: |
          set -euo pipefail
          git checkout c65c70aef6fb00068caed69d99d3b4f2ecbe6346 -- .github/workflows/nexora-governance.yml
          git add -A
          actual_tree="$(git write-tree)"
          echo "actual_tree=$actual_tree"
          test "$actual_tree" = "5245668213c52e5cfa6484c3502f759380feb7e9"
          python scripts/validate_nexora_governance.py --expected-main-head 73c9dadfb81f543e53f45887448fdecbee081850
          python scripts/validate_nexora_app.py
          python scripts/validate_nexora_financial_models.py
          python -m unittest discover -s nexora_app/nexora/tests -p 'test_*contract.py' -v
          PYTHONPATH=nexora_app python -m unittest nexora.tests.test_financial_core nexora.tests.test_ledger_core nexora.tests.test_reference_rules nexora.tests.test_evidence_core nexora.tests.test_directory_core nexora.tests.test_contract_core -v
          node --check nexora_app/nexora/nexora/page/nexora_contracts/nexora_contracts.js
          python -m compileall -q nexora_app/nexora scripts
          python scripts/generate_file_inventory.py --check
      - name: Publish workflow-neutral corrected payload
        shell: bash
        run: |
          set -euo pipefail
          git checkout HEAD -- .github/workflows
          git add -A
          test -z "$(git diff --cached --name-only -- .github/workflows)"
          git config user.name "NEXORA Automation"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "fix(nexora): format contracts and preserve directory assertions"
          git push origin HEAD:nexora-continuidad-total

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate executable governance
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          python scripts/validate_nexora_governance.py \
            --expected-main-head "73c9dadfb81f543e53f45887448fdecbee081850"
      - name: Compile governance validators
        run: |
          python -m py_compile \
            scripts/generate_file_inventory.py \
            scripts/validate_nexora_governance.py
      - name: Verify canonical repository inventory
        run: |
          python scripts/generate_file_inventory.py
          git diff --exit-code -- docs/architecture/file_inventory.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nexora-file-inventory-${{ github.event.pull_request.head.sha || github.sha }}
          path: docs/architecture/file_inventory.json
          if-no-files-found: error
          retention-days: 7
