services:
  - type: pserv
    name: construcontrol-db
    runtime: image
    plan: standard
    image:
      url: docker.io/library/mariadb:10.6
    dockerCommand: mariadbd --bind-address=0.0.0.0 --port=3306 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --skip-character-set-client-handshake
    envVars:
      - key: PORT
        value: 3306
      - key: MARIADB_ROOT_PASSWORD
        generateValue: true
    disk:
      name: construcontrol-mariadb
      mountPath: /var/lib/mysql
      sizeGB: 20

  - type: keyvalue
    name: construcontrol-redis-cache
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
    persistenceMode: "off"

  - type: keyvalue
    name: construcontrol-redis-queue
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction
    persistenceMode: journal-snapshot

  - type: pserv
    name: construcontrol-backend
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: bash /home/frappe/frappe-bench/apps/erpnext/deploy/render/start-backend.sh
    preDeployCommand: bash /home/frappe/frappe-bench/apps/erpnext/deploy/render/predeploy.sh
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 60
    envVars:
      - key: SITE_NAME
        value: construcontrol
      - key: FRAPPE_SITE_NAME_HEADER
        value: construcontrol
      - key: FRAPPE_EXTERNAL_URL
        sync: false
      - key: DB_HOST
        fromService: {type: pserv, name: construcontrol-db, property: host}
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: _construcontrol
      - key: DB_PASSWORD
        generateValue: true
      - key: DB_ROOT_USER
        value: root
      - key: DB_ROOT_PASSWORD
        fromService: {type: pserv, name: construcontrol-db, envVarKey: MARIADB_ROOT_PASSWORD}
      - key: REDIS_CACHE
        fromService: {type: keyvalue, name: construcontrol-redis-cache, property: connectionString}
      - key: REDIS_QUEUE
        fromService: {type: keyvalue, name: construcontrol-redis-queue, property: connectionString}
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRAPPE_ENCRYPTION_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVER_KEY
        sync: false
      - key: SUPABASE_STORAGE_MODE
        value: enabled
      - key: SUPABASE_STORAGE_BUCKET
        value: construction-evidence
      - key: SUPABASE_MIGRATION_BUCKET
        value: construcontrol-migration
      - key: SUPABASE_BACKUP_BUCKET
        value: construcontrol-backups
      - key: GUNICORN_WORKERS
        value: 2
      - key: GUNICORN_THREADS
        value: 4

  - type: pserv
    name: construcontrol-websocket
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: bash /home/frappe/frappe-bench/apps/erpnext/deploy/render/start-websocket.sh
    autoDeployTrigger: checksPass
    envVars:
      - key: SITE_NAME
        value: construcontrol
      - key: DB_HOST
        fromService: {type: pserv, name: construcontrol-db, property: host}
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: _construcontrol
      - key: DB_PASSWORD
        fromService: {type: pserv, name: construcontrol-backend, envVarKey: DB_PASSWORD}
      - key: REDIS_CACHE
        fromService: {type: keyvalue, name: construcontrol-redis-cache, property: connectionString}
      - key: REDIS_QUEUE
        fromService: {type: keyvalue, name: construcontrol-redis-queue, property: connectionString}
      - key: FRAPPE_ENCRYPTION_KEY
        fromService: {type: pserv, name: construcontrol-backend, envVarKey: FRAPPE_ENCRYPTION_KEY}

  - type: worker
    name: construcontrol-worker
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: bash /home/frappe/frappe-bench/apps/erpnext/deploy/render/start-worker.sh short,default,long
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 120
    envVars:
      - key: SITE_NAME
        value: construcontrol
      - key: DB_HOST
        fromService: {type: pserv, name: construcontrol-db, property: host}
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: _construcontrol
      - key: DB_PASSWORD
        fromService: {type: pserv, name: construcontrol-backend, envVarKey: DB_PASSWORD}
      - key: REDIS_CACHE
        fromService: {type: keyvalue, name: construcontrol-redis-cache, property: connectionString}
      - key: REDIS_QUEUE
        fromService: {type: keyvalue, name: construcontrol-redis-queue, property: connectionString}
      - key: FRAPPE_ENCRYPTION_KEY
        fromService: {type: pserv, name: construcontrol-backend, envVarKey: FRAPPE_ENCRYPTION_KEY}
      - key: SUPABASE_URL
        fromService: {type: pserv, name: construcontrol-backend, envVarKey: SUPABASE_URL}
      - key: SUPABASE_SERVER_KEY
        fromService: {type: pserv, name: construcontrol-backend, envVarKey: SUPABASE_SERVER_KEY}
      - key: SUPABASE_STORAGE_MODE
        value: enabled
      - key: SUPABASE_STORAGE_BUCKET
        value: construction-evidence

  - type: worker
    name: construcontrol-scheduler
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: bash /home/frappe/frappe-bench/apps/erpnext/deploy/render/start-scheduler.sh
    autoDeployTrigger: checksPass
    envVars:
      - key: SITE_NAME
        value: construcontrol
      - key: DB_HOST
        fromService: {type: pserv, name: construcontrol-db, property: host}
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: _construcontrol
      - key: DB_PASSWORD
        fromService: {type: pserv, name: construcontrol-backend, envVarKey: DB_PASSWORD}
      - key: REDIS_CACHE
        fromService: {type: keyvalue, name: construcontrol-redis-cache, property: connectionString}
      - key: REDIS_QUEUE
        fromService: {type: keyvalue, name: construcontrol-redis-queue, property: connectionString}
      - key: FRAPPE_ENCRYPTION_KEY
        fromService: {type: pserv, name: construcontrol-backend, envVarKey: FRAPPE_ENCRYPTION_KEY}

  - type: web
    name: construcontrol-web
    runtime: docker
    plan: starter
    dockerfilePath: ./deploy/render/Dockerfile.frontend
    dockerContext: .
    dockerCommand: bash /home/frappe/frappe-bench/apps/erpnext/deploy/render/start-frontend.sh
    autoDeployTrigger: checksPass
    healthCheckPath: /api/method/ping
    maxShutdownDelaySeconds: 30
    envVars:
      - key: BACKEND
        fromService: {type: pserv, name: construcontrol-backend, property: hostport}
      - key: SOCKETIO
        fromService: {type: pserv, name: construcontrol-websocket, property: hostport}
      - key: FRAPPE_SITE_NAME_HEADER
        value: construcontrol
      - key: PROXY_READ_TIMEOUT
        value: 120
      - key: CLIENT_MAX_BODY_SIZE
        value: 50m

  - type: cron
    name: construcontrol-backup
    runtime: docker
    plan: standard
    schedule: "0 8 * * *"
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: bash /home/frappe/frappe-bench/apps/erpnext/deploy/render/run-backup.sh
    autoDeployTrigger: checksPass
    envVars:
      - key: SITE_NAME
        value: construcontrol
      - key: DB_HOST
        fromService: {type: pserv, name: construcontrol-db, property: host}
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: _construcontrol
      - key: DB_PASSWORD
        fromService: {type: pserv, name: construcontrol-backend, envVarKey: DB_PASSWORD}
      - key: REDIS_CACHE
        fromService: {type: keyvalue, name: construcontrol-redis-cache, property: connectionString}
      - key: REDIS_QUEUE
        fromService: {type: keyvalue, name: construcontrol-redis-queue, property: connectionString}
      - key: FRAPPE_ENCRYPTION_KEY
        fromService: {type: pserv, name: construcontrol-backend, envVarKey: FRAPPE_ENCRYPTION_KEY}
      - key: SUPABASE_URL
        fromService: {type: pserv, name: construcontrol-backend, envVarKey: SUPABASE_URL}
      - key: SUPABASE_SERVER_KEY
        fromService: {type: pserv, name: construcontrol-backend, envVarKey: SUPABASE_SERVER_KEY}
      - key: SUPABASE_BACKUP_BUCKET
        value: construcontrol-backups
